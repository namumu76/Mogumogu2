<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>もぐもぐタイム！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
:root{
  --green:#3EC98A;--green2:#2AAD70;
  --amber:#FFB830;--amber2:#D9920A;
  --bg:#FFF6EE;--card:#FFFFFF;--border:#EDE8E2;
  --text:#2E2A26;--muted:#A09890;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center;}
#root{width:100%;max-width:460px;padding:1.4rem 1rem 4rem;}
.screen{display:none;flex-direction:column;align-items:center;gap:1.1rem;}
.screen.on{display:flex;}
h1{font-size:24px;font-weight:800;color:var(--text);text-align:center;}
.sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;}
.divider{width:100%;height:1.5px;background:var(--border);margin:.3rem 0;}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 28px;border-radius:50px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;}
.btn:active{transform:scale(.96);}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 4px 0 var(--green2);}
.btn.primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green2);}
.btn.primary:disabled{background:#B2E8D0;border-color:#B2E8D0;box-shadow:none;cursor:default;}
.btn.ghost{background:transparent;border-color:#D8D2CC;color:var(--muted);font-size:13px;padding:8px 18px;}
/* 画面1 */
.char-cards{display:flex;gap:20px;justify-content:center;}
.ccard{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 14px;border-radius:24px;border:3px solid var(--border);background:var(--card);cursor:pointer;transition:transform .15s,border-color .15s,background .15s;}
.ccard:active{transform:scale(.95);}
.ccard img{width:110px;height:128px;object-fit:cover;border-radius:12px;}
.ccard-label{font-size:14px;font-weight:800;color:var(--muted);}
.ccard.sel.boy{border-color:#6DB8F2;background:#EDF6FF;}
.ccard.sel.girl{border-color:#FF8EC0;background:#FFF0F8;}
.ccard.sel.boy .ccard-label{color:#3A84CC;}
.ccard.sel.girl .ccard-label{color:#CC4E8A;}
.age-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.atab{padding:9px 22px;border-radius:50px;border:2px solid var(--border);background:var(--card);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .14s;}
.atab.sel{background:var(--green);color:#fff;border-color:var(--green);}
.level-selector{display:flex;align-items:center;gap:16px;}
.level-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:26px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.level-btn:active{transform:scale(.9);}
.level-val{font-size:36px;font-weight:800;color:var(--text);min-width:64px;text-align:center;}
.level-unit{font-size:14px;color:var(--muted);font-weight:700;}
/* 画面2 */
.cam-wrap{position:relative;width:240px;height:180px;}
.cam-wrap video{width:100%;height:100%;object-fit:cover;border-radius:20px;border:3px solid var(--border);transform:scaleX(-1);}
.cam-status-bar{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);}
.sdot{width:10px;height:10px;border-radius:50%;background:#D0C8C0;flex-shrink:0;}
.sdot.on{background:var(--green);} .sdot.cal{background:var(--amber);}
.sens-row{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--muted);}
.sens-row input{width:110px;accent-color:var(--green);}
/* キャラ表示エリア */
.char-area{display:flex;align-items:flex-end;gap:1.2rem;}
.chew-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.chew-col span{font-size:11px;font-weight:700;color:var(--muted);}
.chew-bar-wrap{width:14px;height:80px;background:#EDE8E2;border-radius:7px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
.chew-bar{width:100%;background:var(--green);transition:height .08s;border-radius:7px;}
.chew-n{font-size:18px;font-weight:800;color:var(--text);}
.speech{background:var(--card);border:2.5px solid var(--border);border-radius:16px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text);max-width:150px;line-height:1.5;}
/* ★ キャラクター画像 + 口オーバーレイ */
.char-img-wrap{
  position:relative;
  width:140px;
  height:163px;
  border-radius:16px;
  overflow:hidden;
}
.char-img-wrap img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:16px;
  display:block;
}
/* 口を隠すマスク（肌色の楕円） */
.mouth-mask{
  position:absolute;
  border-radius:50%;
  background:#F5C898; /* 肌色 */
  transition:transform 0.08s ease;
  transform-origin:top center;
}
/* 口（笑顔カーブ） */
.mouth-smile{
  position:absolute;
  border-radius:50%;
  background:transparent;
  border-bottom:3px solid #C07040;
  transition:all 0.08s ease;
}
/* 画面3 */
.badge-row{width:100%;display:flex;justify-content:space-between;gap:6px;}
.badge{border-radius:50px;padding:5px 14px;font-size:12px;font-weight:800;}
.bg{background:#E0F7EC;border:1.5px solid #8FE0BC;color:#0D6B40;}
.ba{background:#FFF0CC;border:1.5px solid #FFD070;color:#7A4800;}
.br{background:#FFE8EE;border:1.5px solid #FFB0C0;color:#8B1A30;}
.bite-display{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bite-label{font-size:12px;font-weight:700;color:var(--muted);}
.bite-nums{display:flex;align-items:baseline;gap:6px;}
.bite-current{font-size:72px;font-weight:800;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
.bite-sep{font-size:24px;color:#D8D2CC;}
.bite-goal{font-size:30px;font-weight:700;color:#C8C0B8;font-variant-numeric:tabular-nums;}
.bite-prog-wrap{width:100%;max-width:340px;height:16px;background:#EDE8E2;border-radius:8px;overflow:hidden;}
.bite-prog-fill{height:100%;background:var(--amber);border-radius:8px;transition:width .3s ease;}
.timer-num{font-size:40px;font-weight:700;color:#C0B8B0;letter-spacing:1px;font-variant-numeric:tabular-nums;}
.chew-mini{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--muted);}
.chew-mini-bar-wrap{width:90px;height:8px;background:#EDE8E2;border-radius:4px;overflow:hidden;}
.chew-mini-bar{height:100%;background:var(--green);transition:width .08s;border-radius:4px;}
.bite-btn{width:100%;max-width:300px;padding:22px;border-radius:24px;border:none;background:var(--amber);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 5px 0 var(--amber2);-webkit-tap-highlight-color:transparent;transition:transform .08s,box-shadow .08s;}
.bite-btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--amber2);}
.bite-btn:disabled{background:#D8D2CC;box-shadow:none;cursor:default;}
.missions{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px;}
.mission{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:16px;border:2px solid var(--border);background:var(--card);}
.mission.done{opacity:.45;background:#F5F2EF;}
.mi{font-size:18px;width:26px;text-align:center;}
.mt{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.mp{font-size:12px;font-weight:800;color:var(--green2);background:#E0F7EC;border-radius:50px;padding:3px 12px;}
.mission.done .mp{color:var(--muted);background:#EDE8E2;}
.stamps{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:32px;max-width:320px;}
.stamp{width:36px;height:36px;border-radius:50%;background:#E0F7EC;border:2px solid #8FE0BC;display:flex;align-items:center;justify-content:center;font-size:18px;animation:pop .3s;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.clear-box{padding:22px;border-radius:24px;border:3px solid #8FE0BC;background:#E0F7EC;text-align:center;font-size:16px;font-weight:800;color:#0D6B40;display:none;width:100%;max-width:340px;line-height:2.1;}
.clear-box .emo{font-size:52px;display:block;margin-bottom:8px;}
.bounce{animation:bnc .4s cubic-bezier(.36,.07,.19,.97);}
@keyframes bnc{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}60%{transform:translateY(-8px)}}
</style>
</head>

// ── 口アニメーション（Canvas描画）──
// 画像の上にCanvasを重ねて口を描く
// 1. まず元画像の口を肌色マスクで隠す
// 2. 開いたときはCanvasに口を描く

function setupMouthOverlay(wrapId, imgW, imgH){
  const wrap = $(wrapId);
  const canvas = wrap.querySelector('canvas');
  canvas.width  = imgW;
  canvas.height = imgH;
  canvas.style.width  = imgW+'px';
  canvas.style.height = imgH+'px';
  canvas.style.top  = '0';
  canvas.style.left = '0';
}

function setMouthState(isOpen){
  mouthOpen = isOpen;
  // 両画面のCanvasに描画
  ['mouthCanvas2','mouthCanvas3'].forEach((id,i) => {
    const canvas = $(id);
    if(!canvas) return;
    const wrap = canvas.parentElement;
    const imgW = wrap.offsetWidth  || (i===0?140:160);
    const imgH = wrap.offsetHeight || (i===0?163:186);
    canvas.width = imgW; canvas.height = imgH;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,imgW,imgH);

    const t = charType||'boy';
    // スケール係数（元画像240x280 → 表示サイズ）
    const sx = imgW/240, sy = imgH/280;

    // 元画像での口座標（目視で調整済み）
    const raw = (t==='boy')
      ? {cx:120, cy:152, rw:40, rh:13}  // 男の子
      : {cx:122, cy:148, rw:36, rh:11};  // 女の子

    const cx = raw.cx*sx, cy = raw.cy*sy;
    const rw = raw.rw*sx, rh = raw.rh*sy;

    // 肌色マスクで元の口を常時塗りつぶす
    ctx.fillStyle = (t==='boy') ? '#F5C898' : '#F5C898';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rw+2, rh+2, 0, 0, Math.PI*2);
    ctx.fill();

    if(isOpen){
      // 口を開いた状態を描く
      const openH = rh * 2.2;
      // 上唇
      ctx.strokeStyle='#C07040'; ctx.lineWidth=2*sy; ctx.fillStyle='none';
      ctx.beginPath();
      ctx.moveTo(cx-rw, cy); ctx.quadraticCurveTo(cx, cy-rh*0.5, cx+rw, cy);
      ctx.stroke();
      // 口の中（暗い赤）
      ctx.fillStyle='#8B2020';
      ctx.beginPath();
      ctx.ellipse(cx, cy+openH*0.3, rw*0.85, openH*0.55, 0, 0, Math.PI*2);
      ctx.fill();
      // 歯（上）
      ctx.fillStyle='#FFFDF8';
      ctx.fillRect(cx-rw*0.6, cy, rw*1.2, openH*0.35);
      // 下唇
      ctx.strokeStyle='#C07040'; ctx.lineWidth=2*sy;
      ctx.beginPath();
      ctx.moveTo(cx-rw, cy+openH); ctx.quadraticCurveTo(cx, cy+openH+rh*0.5, cx+rw, cy+openH);
      ctx.stroke();
    } else {
      // 口を閉じた笑顔
      ctx.strokeStyle='#C07040'; ctx.lineWidth=2*sy;
      ctx.beginPath();
      ctx.moveTo(cx-rw*0.9, cy-rh*0.3);
      ctx.quadraticCurveTo(cx, cy+rh*1.2, cx+rw*0.9, cy-rh*0.3);
      ctx.stroke();
    }
  });
}

async function startCamera(){
  $('sdot').className='sdot cal';
  $('stext').textContent='カメラを起動しています...';
  $('calNotice').textContent='';
  $('s2Start').disabled=true;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:320},height:{ideal:240}},audio:false});
    const video=$('video');
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    await video.play();
    offCanvas=document.createElement('canvas');
    offCanvas.width=40;offCanvas.height=40;
    offCtx=offCanvas.getContext('2d',{willReadFrequently:true});
    $('sdot').className='sdot on';
    $('stext').textContent='顔をカメラに向けてください';
    $('calNotice').textContent='キャリブレーション中… 0/30';
    startDetection(video);
  }catch(e){
    $('sdot').className='sdot';
    $('stext').textContent='カメラの許可が必要です';
    $('calNotice').textContent=e.name==='NotAllowedError'?'ブラウザのアドレスバーからカメラを許可してください。':'エラー: '+e.message;
  }
}

function startDetection(video){
  function loop(){
    rafId=requestAnimationFrame(loop);
    if(video.readyState<2) return;
    const vw=video.videoWidth||320,vh=video.videoHeight||240;
    offCtx.drawImage(video,vw*.20,vh*.50,vw*.60,vh*.30,0,0,40,40);
    const d=offCtx.getImageData(0,0,40,40).data;
    let sum=0;for(let i=0;i<d.length;i+=4)sum+=d[i];
    const cur=sum/1600;
    if(prevVal===null){prevVal=cur;return;}
    const diff=Math.abs(cur-prevVal);prevVal=cur;
    smoothed=smoothed*.7+diff*.3;
    if(calFrames<30){
      baselineSamples.push(smoothed);calFrames++;
      $('calNotice').textContent=`キャリブレーション中… ${calFrames}/30`;
      return;
    }
    if(calFrames===30){
      baselineDiff=baselineSamples.reduce((a,b)=>a+b,0)/baselineSamples.length;
      calFrames++;
      $('calNotice').textContent='準備OK！口を動かしてみてね 🟢';
      $('s2Start').disabled=false;
    }
    const threshold=Math.max(0.3,baselineDiff*(12-sensitivity));
    if(!inPeak&&smoothed>threshold){
      inPeak=true;
      setMouthState(true);
    }else if(inPeak&&smoothed<threshold*.4){
      inPeak=false;
      setMouthState(false);
      chewCount++;updateChewUI();
      if(chewCount>=30)completeMission('chew30');
      if(chewCount>=50)completeMission('chew50');
      if(chewCount>=100)completeMission('chew100');
      if(chewCount%10===0)setSpeech(SPEECH_CHEW[Math.floor(Math.random()*SPEECH_CHEW.length)]);
    }
  }
  loop();
}
function stopDetection(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
}

function addBite(){
  if(cleared)return;
  biteCount++;
  $('biteCount').textContent=biteCount;
  $('biteProgFill').style.width=Math.min(100,Math.round(biteCount/goalBites*100))+'%';
  chewCount=0;updateChewUI();
  bounceChar();
  setSpeech(SPEECH_BITE[Math.floor(Math.random()*SPEECH_BITE.length)]);
  if(biteCount>=5)completeMission('b5');
  if(biteCount>=10)completeMission('b10');
  if(biteCount>=20)completeMission('b20');
  if(biteCount>=goalBites)showClear();
}

function showClear(){
  if(cleared)return;
  cleared=true;clearInterval(timerInt);timerInt=null;
  completeMission('clear');
  const lv=points<30?1:points<70?2:points<120?3:4;
  const cb=$('clearBox');
  cb.style.cssText='display:block;border-color:#8FE0BC;background:#E0F7EC;color:#0D6B40;';
  cb.querySelector('.emo').textContent='🎉';
  $('clearMsg').innerHTML=`${goalBites}口ぜんぶたべたね！<br>⭐ ${points}pt　レベル${lv}<br>もぐもぐ${chewCount}回！`;
  setSpeech('やったー！ぜんぶたべた！🎉');
  bounceChar();$('biteBtn').disabled=true;
}
function timeUp(){
  $('biteBtn').disabled=true;
  const cb=$('clearBox');
  cb.style.cssText='display:block;border-color:#FFD070;background:#FFF0CC;color:#7A4800;';
  cb.querySelector('.emo').textContent='⏰';
  $('clearMsg').innerHTML=`時間切れ！${biteCount}口たべたね！<br>次はクリアしよう！<br>⭐ ${points}pt`;
  setSpeech('よくがんばったね！');
}

function goS3(){
  applyCharStyle(3);
  setTimeout(()=>setMouthState(false),50);
  cfg=JSON.parse(JSON.stringify(CFGS[ageKey]));
  totalSec=cfg.mins*60;remaining=totalSec;
  points=0;stampArr=[];chewCount=0;biteCount=0;cleared=false;
  $('ptBadge').textContent='⭐ 0 pt';
  $('lvBadge').textContent='レベル 1';
  $('goalBadge').textContent=`目標 ${goalBites}口`;
  $('biteGoalDisp').textContent=goalBites;
  $('biteCount').textContent='0';
  $('biteProgFill').style.width='0%';
  $('stampsEl').innerHTML='';
  $('clearBox').style.display='none';
  $('biteBtn').disabled=false;
  updateChewUI();renderMissions();updateTimer();
  showScreen(S3);
  timerInt=setInterval(()=>{
    remaining--;updateTimer();
    if(remaining<=0&&!cleared){clearInterval(timerInt);timerInt=null;timeUp();}
  },1000);
}

function updateTimer(){
  $('timerEl').textContent=String(Math.floor(remaining/60)).padStart(2,'0')+':'+String(remaining%60).padStart(2,'0');
}
function renderMissions(){
  $('missionEl').innerHTML='';
  cfg.missions.forEach(m=>{
    const d=document.createElement('div');
    d.className='mission'+(m.done?' done':'');
    d.id='ms-'+m.id;
    d.innerHTML=`<div class="mi">${m.done?'✅':m.icon}</div><div class="mt">${m.text}</div><div class="mp">${m.done?'クリア！':'+'+m.pts+'pt'}</div>`;
    $('missionEl').appendChild(d);
  });
}
function completeMission(id){
  const m=cfg?.missions.find(x=>x.id===id);
  if(!m||m.done)return;
  m.done=true;addPoints(m.pts);addStamp();renderMissions();
}
function addPoints(p){
  points+=p;
  $('ptBadge').textContent='⭐ '+points+' pt';
  $('lvBadge').textContent='レベル '+(points<30?1:points<70?2:points<120?3:4);
}
function addStamp(){
  const s=document.createElement('div');
  s.className='stamp';s.textContent=STAMPS[stampArr.length%STAMPS.length];
  $('stampsEl').appendChild(s);stampArr.push(s);
}
function bounceChar(){
  [$('charWrap2'),$('charWrap3')].forEach(el=>{
    if(!el)return;
    el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce');
    setTimeout(()=>el.classList.remove('bounce'),400);
  });
}
function setSpeech(msg){$('speech2').textContent=msg;$('speech3').textContent=msg;}
</script>
