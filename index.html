<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>もぐもぐタイム！</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fdf6ee;--mint:#7ecec4;--peach:#f4a86a;--pink:#f48ba2;--text:#3d2b1f;--gray:#b0a09a;--sh:0 4px 20px rgba(0,0,0,.08)}
body{font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none;min-height:100vh;padding:24px 20px 40px;flex-direction:column;align-items:center}
.screen.active{display:flex}
.ttl{font-size:26px;font-weight:900;margin-bottom:4px}
.sub{font-size:13px;color:var(--gray);margin-bottom:24px}
.sec{width:100%;margin-bottom:24px}
.sec-lbl{font-size:13px;color:var(--gray);text-align:center;margin-bottom:10px}
.ctr{display:flex;align-items:center;justify-content:center;gap:20px}
.cb{width:52px;height:52px;border-radius:50%;font-size:26px;border:2px solid #e0d8d2;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;-webkit-tap-highlight-color:transparent;user-select:none}
.cb:active{background:var(--mint);border-color:var(--mint);color:#fff;transform:scale(.93)}
.cv{font-size:36px;font-weight:900;min-width:80px;text-align:center}
.cu{font-size:14px;color:var(--gray)}
.btn-next{width:100%;max-width:320px;padding:16px;border-radius:30px;background:var(--mint);color:#fff;font-size:18px;font-weight:900;border:none;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(126,206,196,.4)}
.btn-next:disabled{opacity:.4;cursor:default}
.char-row{display:flex;gap:16px;width:100%;margin-bottom:28px}
.char-card{flex:1;background:#fff;border-radius:20px;padding:14px 10px 16px;text-align:center;box-shadow:var(--sh);cursor:pointer;border:3px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.char-card.selected{border-color:var(--mint);background:#eef9f7}
.char-card img{width:100%;border-radius:12px;aspect-ratio:1;object-fit:cover}
.char-label{margin-top:8px;font-size:15px;font-weight:700}
.cam-main{display:flex;gap:12px;width:100%;margin-bottom:12px}
.cam-box{flex:1;aspect-ratio:3/4;background:#f0ebe5;border-radius:16px;overflow:hidden;position:relative}
#camVideo{width:100%;height:100%;object-fit:cover;display:none;transform:scaleX(-1)}
.cam-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--gray)}
.cam-right{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.cam-right img{width:100%;border-radius:16px;display:block}
.mugu-num{font-size:28px;font-weight:900;color:var(--mint);text-align:center}
.mugu-lbl{font-size:11px;color:var(--gray);margin-top:-6px}
.btn-cam{width:100%;padding:12px 8px;border-radius:14px;background:#fff;color:var(--mint);font-size:13px;font-weight:900;border:2px solid var(--mint);cursor:pointer;line-height:1.3}
.btn-cam:disabled{opacity:.5;cursor:default}
.cam-st{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);margin-bottom:8px;width:100%}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#5cb85c}.dot.err{background:#e05c5c}
.sens-row{width:100%;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.sens-row label{font-size:13px;color:var(--gray);white-space:nowrap}
#sSlider{flex:1;accent-color:var(--mint)}
.meter-bar{width:100%;height:8px;background:#e8e0d8;border-radius:4px;overflow:hidden;margin-bottom:10px}
.meter-fill{height:100%;background:var(--mint);border-radius:4px;transition:width .1s;width:0%}
.hint{font-size:11px;color:var(--gray);margin-bottom:14px;text-align:center;line-height:1.6}
.btn-row{display:flex;gap:12px;width:100%}
.btn-s{flex:1.5;padding:16px;border-radius:30px;background:var(--mint);color:#fff;font-size:18px;font-weight:900;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(126,206,196,.4)}
.btn-b{flex:1;padding:16px;border-radius:30px;background:#fff;color:var(--gray);font-size:15px;font-weight:700;border:2px solid #e0d8d2;cursor:pointer}
.hud{display:flex;justify-content:space-between;width:100%;margin-bottom:12px}
.badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:800}
.b-lv{background:#d4f5f0;color:var(--mint)}.b-pt{background:#fef8d0;color:#c9a000}.b-gl{background:#fde0e6;color:var(--pink)}
.char-wrap{width:100%;max-width:360px;border-radius:20px;overflow:hidden;margin-bottom:10px}
.char-wrap img{width:100%;display:block}
.bubble{background:#fff;border-radius:16px;padding:8px 16px;font-size:15px;font-weight:800;box-shadow:var(--sh);margin-bottom:12px;text-align:center}
.cnt-lbl{font-size:13px;color:var(--gray);margin-bottom:2px}
.cnt-disp{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.cnt-main{font-size:52px;font-weight:900;line-height:1}
.cnt-tot{font-size:20px;color:var(--gray)}
.prog-wrap{width:100%;max-width:360px;height:12px;background:#e8e0d8;border-radius:6px;overflow:hidden;margin-bottom:12px}
.prog-bar{height:100%;background:var(--mint);border-radius:6px;transition:width .4s}
.mugu-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray);margin-bottom:4px;width:100%;max-width:360px}
.mugu-bar{flex:1;height:8px;background:#e8e0d8;border-radius:4px;overflow:hidden}
.mugu-fill{height:100%;background:var(--peach);border-radius:4px;transition:width .3s}
.timer{font-size:40px;font-weight:900;color:#c8bdb5;letter-spacing:2px;margin-bottom:12px}
.btn-bite{width:100%;max-width:360px;padding:20px;background:var(--peach);color:#fff;font-size:20px;font-weight:900;border:none;border-radius:20px;cursor:pointer;box-shadow:0 6px 20px rgba(244,168,106,.4);letter-spacing:1px;margin-bottom:16px;-webkit-tap-highlight-color:transparent}
.btn-bite:active{transform:scale(.96)}
#s4{background:linear-gradient(160deg,#fff9ee,#fde0e6)}
.g-star{font-size:40px;margin-bottom:8px}
.g-ttl{font-size:30px;font-weight:900;color:var(--pink);margin-bottom:6px}
.g-sub{font-size:15px;color:var(--gray);margin-bottom:20px}
.g-img{width:100%;max-width:300px;border-radius:20px;margin-bottom:20px}
.g-stats{background:#fff;border-radius:20px;padding:18px 22px;width:100%;max-width:300px;box-shadow:var(--sh);margin-bottom:20px}
.g-row{display:flex;justify-content:space-between;font-size:15px;margin-bottom:8px}
.g-val{font-weight:900}
.btn-retry{width:100%;max-width:300px;padding:16px;border-radius:30px;background:var(--pink);color:#fff;font-size:18px;font-weight:900;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(244,139,162,.4)}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.12)}100%{transform:scale(1)}}
.pop{animation:pop .2s ease-out}
</style>
</head>
<body>

<!-- 画面1 -->
<div class="screen active" id="s1">
  <div style="font-size:28px;margin-bottom:4px">🍴</div>
  <div class="ttl">もぐもぐタイム！</div>
  <div class="sub">キャラクターをえらんでね</div>
  <div class="char-row">
    <div class="char-card" id="boyCard" onclick="selChar('boy')">
      <img src="img/boy_n1.png" alt="男の子">
      <div class="char-label">👦 男の子</div>
    </div>
    <div class="char-card" id="girlCard" onclick="selChar('girl')">
      <img src="img/girl_n1.png" alt="女の子">
      <div class="char-label">👧 女の子</div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-lbl">目標時間は？</div>
    <div class="ctr">
      <button class="cb" onclick="chgTime(-10)">－</button>
      <div class="cv" id="timeVal">10</div><div class="cu">分</div>
      <button class="cb" onclick="chgTime(10)">＋</button>
    </div>
  </div>
  <div class="sec">
    <div class="sec-lbl">目標の口数は？</div>
    <div class="ctr">
      <button class="cb" onclick="chgGoal(-20)">－</button>
      <div class="cv" id="goalVal">20</div><div class="cu">口</div>
      <button class="cb" onclick="chgGoal(20)">＋</button>
    </div>
  </div>
  <button class="btn-next" id="btnNext" onclick="toS2()" disabled>次へ →</button>
</div>

<!-- 画面2 -->
<div class="screen" id="s2">
  <div class="ttl" style="margin-bottom:16px">📷 カメラ確認</div>
  <div class="cam-main">
    <div class="cam-box">
      <video id="camVideo" autoplay muted playsinline webkit-playsinline></video>
      <div class="cam-ph" id="camPh"><div style="font-size:32px">📷</div><div>カメラ未起動</div></div>
    </div>
    <div class="cam-right">
      <img id="previewImg" alt="キャラ">
      <div class="mugu-num" id="prevCnt">0</div>
      <div class="mugu-lbl">もぐもぐ</div>
      <button class="btn-cam" id="btnCam" onclick="startCam()">📷 カメラを<br>起動する</button>
    </div>
  </div>
  <div class="cam-st"><div class="dot" id="camDot"></div><span id="camMsg">カメラの許可が必要です</span></div>
  <div class="sens-row">
    <label>感度：</label>
    <input type="range" id="sSlider" min="1" max="10" value="6"
      oninput="sens=+this.value;document.getElementById('sVal').textContent=this.value">
    <span id="sVal">6</span>
  </div>
  <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
  <div class="hint">カメラ起動後、3秒間静止してキャリブレーションしてください<br>その後もぐもぐすると連動します</div>
  <div class="btn-row">
    <button class="btn-s" onclick="startGame()">🍴 スタート！</button>
    <button class="btn-b" onclick="toS1()">← もどる</button>
  </div>
</div>

<!-- 画面3 -->
<div class="screen" id="s3">
  <div class="hud">
    <div class="badge b-lv" id="lvBadge">レベル 1</div>
    <div class="badge b-pt" id="ptBadge">⭐ 0 pt</div>
    <div class="badge b-gl" id="glBadge">目標 20口</div>
  </div>
  <div class="char-wrap"><img id="gameImg" alt="キャラ"></div>
  <div class="bubble" id="bubble">もぐもぐ名人！</div>
  <div class="cnt-lbl">食べた口数</div>
  <div class="cnt-disp">
    <div class="cnt-main" id="biteCnt">0</div>
    <div class="cnt-tot" id="biteTot">/ 20</div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="mugu-row">
    <span>もぐもぐ</span>
    <div class="mugu-bar"><div class="mugu-fill" id="muguFill" style="width:0%"></div></div>
    <span id="muguCnt">0</span>
  </div>
  <div class="timer" id="timerDisp">10:00</div>
  <button class="btn-bite" id="btnBite" onclick="onBite()">🍴 1口！</button>
</div>

<!-- ゴール -->
<div class="screen" id="s4">
  <div class="g-star">🎉⭐🎉</div>
  <div class="g-ttl">ぜんぶたべたね！</div>
  <div class="g-sub">すごい！もぐもぐ名人だ！</div>
  <img id="goalImg" class="g-img" alt="ゴール">
  <div class="g-stats">
    <div class="g-row"><span>食べた口数</span><span class="g-val" id="fBite">-</span></div>
    <div class="g-row"><span>もぐもぐ回数</span><span class="g-val" id="fMugu">-</span></div>
    <div class="g-row"><span>かかった時間</span><span class="g-val" id="fTime">-</span></div>
  </div>
  <button class="btn-retry" onclick="restart()">🔄 もういちど</button>
</div>

<script>
const IM={
  boy: {n1:'boy_n1',m1:'boy_m1',n2:'boy_n2',m2:'boy_m2',goal:'boy_goal'},
  girl:{n1:'girl_n1',m1:'girl_m1',n2:'girl_n2',m2:'girl_m2',goal:'girl_goal'}
};
const ip=k=>`img/${k}.png`;
const $=id=>document.getElementById(id);

let chr=null,tMin=10,tBite=20,sens=6;
let bites=0,muguAll=0,muguSes=0;
let tSec=0,tTimer=null,isOpen=false;
let camStream=null,detTimer=null,canvas=null,ctx=null,cur='s1';
// 顎検知用
let baseline=null,calibFrames=[],calibDone=false;
let jawHist=[],jawState='up',jawCool=0;

function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');cur=id}
function selChar(c){chr=c;$('boyCard').classList.toggle('selected',c==='boy');$('girlCard').classList.toggle('selected',c==='girl');$('btnNext').disabled=false}
function chgTime(d){tMin=Math.max(10,Math.min(60,tMin+d));$('timeVal').textContent=tMin}
function chgGoal(d){tBite=Math.max(20,Math.min(200,tBite+d));$('goalVal').textContent=tBite}

function toS2(){muguSes=0;$('previewImg').src=ip(IM[chr].n1);$('prevCnt').textContent='0';showScr('s2')}
function toS1(){
  stopDet();
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}
  const v=$('camVideo');v.style.display='none';v.srcObject=null;
  $('camPh').style.display='flex';$('camDot').className='dot';
  $('camMsg').textContent='カメラの許可が必要です';
  $('btnCam').innerHTML='📷 カメラを<br>起動する';$('btnCam').disabled=false;
  showScr('s1');
}

async function startCam(){
  $('camMsg').textContent='起動中...';
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    const v=$('camVideo');v.srcObject=camStream;
    v.onloadedmetadata=()=>v.play().then(()=>{
      v.style.display='block';$('camPh').style.display='none';
      $('camDot').className='dot ok';$('camMsg').textContent='カメラ接続中';
      $('btnCam').innerHTML='✅ 起動済み';$('btnCam').disabled=true;
      canvas=document.createElement('canvas');ctx=canvas.getContext('2d');
      startDet();
    }).catch(e=>camErr('再生エラー:'+e.name));
  }catch(e){
    camErr({NotAllowedError:'カメラの許可が必要です',NotFoundError:'カメラが見つかりません',NotReadableError:'カメラが使用中です'}[e.name]||'エラー:'+e.name);
  }
}
function camErr(m){$('camDot').className='dot err';$('camMsg').textContent=m}
function startDet(){
  stopDet();
  baseline=null;calibFrames=[];calibDone=false;
  jawHist=[];jawState='up';jawCool=0;isOpen=false;
  if(cur==='s2')$('camMsg').textContent='キャリブレーション中…（3秒間静止してください）';
  detTimer=setInterval(detect,80);
}
function stopDet(){if(detTimer){clearInterval(detTimer);detTimer=null}}

// 顔下半分の「暗い領域の重心Y」で顎位置を推定
function jawY(v){
  canvas.width=v.videoWidth;canvas.height=v.videoHeight;ctx.drawImage(v,0,0);
  const w=canvas.width,h=canvas.height;
  // 顔の下半分・中央エリアを解析
  const rx=w*.25|0, ry=h*.45|0, rw=w*.5|0, rh=h*.4|0;
  const px=ctx.getImageData(rx,ry,rw,rh).data;
  let sumY=0,cnt=0;
  // 暗い画素（口・影）のY重心を求める
  const darkTh=100;
  for(let i=0;i<px.length;i+=4){
    const lum=(px[i]*.299+px[i+1]*.587+px[i+2]*.114);
    if(lum<darkTh){
      const row=((i/4)/rw)|0;
      sumY+=row; cnt++;
    }
  }
  return cnt>20 ? sumY/cnt : null; // 暗画素が少なすぎる場合はnull
}

function detect(){
  const v=$('camVideo');
  if(!v||!v.videoWidth||v.paused||!camStream)return;
  try{
    const y=jawY(v);
    if(y===null)return;

    // キャリブレーション：最初の約3秒（40フレーム）でベースライン計測
    if(!calibDone){
      calibFrames.push(y);
      const prog=Math.min(100,calibFrames.length/40*100|0);
      if(cur==='s2')$('meterFill').style.width=prog+'%';
      if(calibFrames.length>=40){
        baseline=calibFrames.reduce((a,b)=>a+b)/calibFrames.length;
        calibDone=true;
        if(cur==='s2')$('camMsg').textContent='カメラ接続中（キャリブ完了）';
      }
      return;
    }

    // ベースラインからのズレ（下方向が正）
    const diff=y-baseline;
    // 感度に応じた閾値（sensが高いほど小さな動きで反応）
    const th=8+(10-sens)*2; // sens=1:26px, sens=10:8px

    // メーター表示
    if(cur==='s2')$('meterFill').style.width=Math.min(100,Math.abs(diff)/th*50+50|0)+'%';

    if(jawCool>0){jawCool--;return}

    // ピーク検出：「up→down（顎が下がる）→up（戻る）」で1もぐもぐ
    if(jawState==='up' && diff>th){
      jawState='down'; isOpen=true;
      if(cur==='s2'){$('previewImg').src=ip(IM[chr].m1);$('prevCnt').textContent=muguSes}
      else if(cur==='s3'){updChar()}
    } else if(jawState==='down' && diff<th*0.4){
      jawState='up'; isOpen=false; jawCool=4;
      muguSes++; muguAll++;
      if(cur==='s2'){$('previewImg').src=ip(IM[chr].n1);$('prevCnt').textContent=muguSes}
      else if(cur==='s3'){updChar();updMugu()}
    }
  }catch(e){}
}

function startGame(){
  bites=0;muguAll=0;muguSes=0;isOpen=false;tSec=tMin*60;
  // キャリブ済みならそのまま引き継ぎ、未完なら再スタート
  if(!calibDone){startDet()}
  $('glBadge').textContent='目標 '+tBite+'口';$('biteTot').textContent='/ '+tBite;
  $('lvBadge').textContent='レベル 1';$('ptBadge').textContent='⭐ 0 pt';
  $('biteCnt').textContent='0';$('progBar').style.width='0%';
  $('muguFill').style.width='0%';$('muguCnt').textContent='0';
  updTimer();showScr('s3');updChar();
  tTimer=setInterval(()=>{tSec--;updTimer();if(tSec<=0){clearInterval(tTimer);stopDet();showGoal()}},1000);
}
function onBite(){
  bites++;muguSes=0;
  $('biteCnt').textContent=bites;
  $('progBar').style.width=Math.min(100,bites/tBite*100|0)+'%';
  $('muguFill').style.width='0%';$('muguCnt').textContent='0';
  updChar();
  $('ptBadge').textContent='⭐ '+(bites*10+muguAll)+' pt';
  $('lvBadge').textContent='レベル '+(bites/10|0+1);
  const b=$('btnBite');b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');
  if(bites>=tBite){clearInterval(tTimer);stopDet();showGoal()}
}
function updMugu(){
  $('muguFill').style.width=Math.min(100,muguSes/30*100|0)+'%';
  $('muguCnt').textContent=muguSes;
}
function updChar(){
  if(!chr)return;
  const k=bites>=tBite?'goal':bites>=tBite/2?(isOpen?'m2':'n2'):(isOpen?'m1':'n1');
  $('gameImg').src=ip(IM[chr][k]);
  const sp=['もぐもぐ名人！','よく噛んでえらい！','おいしそう！','がんばれ！','もうちょっと！'];
  $('bubble').textContent=isOpen?'もぐもぐ…！':sp[Math.min(bites/tBite*sp.length|0,sp.length-1)];
}
function updTimer(){
  const m=tSec/60|0,s=tSec%60;
  $('timerDisp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function showGoal(){
  $('goalImg').src=ip(IM[chr].goal);
  $('fBite').textContent=bites+'口';$('fMugu').textContent=muguAll+'回';
  const e=tMin*60-tSec;
  $('fTime').textContent=String(e/60|0).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
  showScr('s4');
}
function restart(){
  clearInterval(tTimer);stopDet();
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}
  baseline=null;calibFrames=[];calibDone=false;jawHist=[];jawState='up';
  chr=null;isOpen=false;
  $('boyCard').classList.remove('selected');$('girlCard').classList.remove('selected');
  $('btnNext').disabled=true;
  const v=$('camVideo');v.style.display='none';v.srcObject=null;
  $('camPh').style.display='flex';$('camDot').className='dot';
  $('camMsg').textContent='カメラの許可が必要です';
  $('btnCam').innerHTML='📷 カメラを<br>起動する';$('btnCam').disabled=false;
  showScr('s1');
}
</script>
</body>
</html>
