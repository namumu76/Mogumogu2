<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>もぐもぐタイム！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fdf6ee;
    --mint: #7ecec4;
    --peach: #f4a86a;
    --pink: #f48ba2;
    --yellow: #f5c842;
    --text: #3d2b1f;
    --gray: #b0a09a;
    --card: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  body {
    font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; padding: 24px 20px 40px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== SCREEN 1 ===== */
  .title {
    font-size: 28px; font-weight: 900; color: var(--text);
    margin-bottom: 4px; letter-spacing: 1px;
  }
  .subtitle { font-size: 13px; color: var(--gray); margin-bottom: 24px; }

  .char-row { display: flex; gap: 16px; width: 100%; margin-bottom: 28px; }
  .char-card {
    flex: 1; background: var(--card); border-radius: 20px;
    padding: 14px 10px 16px; text-align: center;
    box-shadow: var(--shadow); cursor: pointer;
    border: 3px solid transparent; transition: all .2s;
  }
  .char-card.selected { border-color: var(--mint); background: #eef9f7; }
  .char-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; }
  .char-label { margin-top: 8px; font-size: 15px; font-weight: 700; }

  .section { width: 100%; margin-bottom: 24px; }
  .section-label { font-size: 13px; color: var(--gray); text-align: center; margin-bottom: 10px; }

  .tab-row { display: flex; gap: 8px; justify-content: center; }
  .tab {
    padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 700;
    border: 2px solid #e0d8d2; background: white; cursor: pointer; color: var(--text);
    transition: all .15s;
  }
  .tab.selected { background: var(--mint); border-color: var(--mint); color: white; }

  .counter-row {
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }
  .cnt-btn {
    width: 48px; height: 48px; border-radius: 50%; font-size: 24px;
    border: 2px solid #e0d8d2; background: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--text); transition: all .15s;
  }
  .cnt-btn:active { background: var(--mint); border-color: var(--mint); color: white; }
  .cnt-val { font-size: 36px; font-weight: 900; min-width: 60px; text-align: center; }
  .cnt-unit { font-size: 14px; color: var(--gray); }

  .btn-next {
    width: 100%; max-width: 320px; padding: 16px; border-radius: 30px;
    background: var(--mint); color: white; font-size: 18px; font-weight: 900;
    border: none; cursor: pointer; margin-top: 8px; letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(126,206,196,.4); transition: opacity .2s;
  }
  .btn-next:disabled { opacity: .4; cursor: default; }

  /* ===== SCREEN 2 ===== */
  .cam-title { font-size: 24px; font-weight: 900; margin-bottom: 20px; }
  .cam-box {
    width: 100%; max-width: 340px; aspect-ratio: 4/3;
    background: #f0ebe5; border-radius: 20px; overflow: hidden;
    position: relative; margin-bottom: 12px;
  }
  #camVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
  .cam-placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; color: var(--gray);
  }
  .cam-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--gray); margin-bottom: 16px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.ok { background: #5cb85c; }

  .sensitivity-row {
    width: 100%; max-width: 340px; display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .sensitivity-row label { font-size: 14px; color: var(--gray); white-space: nowrap; }
  #sensitivitySlider { flex: 1; accent-color: var(--mint); }
  #sensitivityVal { font-size: 14px; font-weight: 700; min-width: 20px; }

  .preview-area {
    width: 100%; max-width: 340px; display: flex; align-items: flex-end; gap: 12px;
    margin-bottom: 20px;
  }
  .preview-char { flex: 1; border-radius: 16px; overflow: hidden; }
  .preview-char img { width: 100%; border-radius: 16px; }
  .preview-bubble {
    background: white; border-radius: 16px; padding: 10px 12px;
    font-size: 14px; font-weight: 700; line-height: 1.6;
    box-shadow: var(--shadow); min-width: 80px;
  }
  .mugu-counter-preview {
    font-size: 28px; font-weight: 900; color: var(--mint);
    text-align: center; margin-bottom: 4px;
  }
  .cam-hint { font-size: 12px; color: var(--gray); margin-bottom: 20px; text-align: center; }

  .btn-row { display: flex; gap: 12px; width: 100%; max-width: 340px; }
  .btn-start {
    flex: 1.5; padding: 16px; border-radius: 30px;
    background: var(--mint); color: white; font-size: 18px; font-weight: 900;
    border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(126,206,196,.4);
  }
  .btn-back {
    flex: 1; padding: 16px; border-radius: 30px;
    background: white; color: var(--gray); font-size: 15px; font-weight: 700;
    border: 2px solid #e0d8d2; cursor: pointer;
  }

  /* ===== SCREEN 3 ===== */
  .hud {
    display: flex; justify-content: space-between; width: 100%; margin-bottom: 16px;
  }
  .hud-badge {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 800;
  }
  .hud-level { background: #d4f5f0; color: var(--mint); }
  .hud-pt { background: #fef8d0; color: #c9a000; }
  .hud-goal { background: #fde0e6; color: var(--pink); }

  .char-img-wrap {
    width: 100%; max-width: 360px; border-radius: 20px; overflow: hidden;
    margin-bottom: 12px; position: relative;
  }
  .char-img-wrap img { width: 100%; display: block; }

  .speech-bubble {
    background: white; border-radius: 16px; padding: 8px 16px;
    font-size: 16px; font-weight: 800; box-shadow: var(--shadow);
    margin-bottom: 16px; text-align: center;
  }

  .count-label { font-size: 13px; color: var(--gray); margin-bottom: 4px; }
  .count-display {
    display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px;
  }
  .count-main { font-size: 56px; font-weight: 900; line-height: 1; }
  .count-total { font-size: 22px; color: var(--gray); }

  .progress-bar-wrap {
    width: 100%; max-width: 360px; height: 12px;
    background: #e8e0d8; border-radius: 6px; overflow: hidden; margin-bottom: 16px;
  }
  .progress-bar { height: 100%; background: var(--mint); border-radius: 6px; transition: width .4s; }

  .mugu-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--gray); margin-bottom: 4px;
  }
  .mugu-mini-bar {
    flex: 1; height: 8px; background: #e8e0d8; border-radius: 4px; overflow: hidden;
  }
  .mugu-mini-fill { height: 100%; background: var(--mint); border-radius: 4px; transition: width .3s; }

  .timer-display {
    font-size: 42px; font-weight: 900; color: #c8bdb5;
    letter-spacing: 2px; margin-bottom: 16px;
  }

  .btn-mouth {
    width: 100%; max-width: 360px; padding: 20px;
    background: var(--peach); color: white; font-size: 20px; font-weight: 900;
    border: none; border-radius: 20px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(244,168,106,.4); letter-spacing: 1px;
    transition: transform .1s, box-shadow .1s; margin-bottom: 24px;
  }
  .btn-mouth:active {
    transform: scale(.96);
    box-shadow: 0 2px 8px rgba(244,168,106,.4);
  }

  /* ===== GOAL SCREEN ===== */
  #goalScreen {
    background: linear-gradient(160deg, #fff9ee 0%, #fde0e6 100%);
  }
  .goal-stars { font-size: 40px; margin-bottom: 8px; }
  .goal-title { font-size: 32px; font-weight: 900; color: var(--pink); margin-bottom: 8px; }
  .goal-sub { font-size: 16px; color: var(--gray); margin-bottom: 24px; }
  .goal-char { width: 100%; max-width: 320px; border-radius: 20px; margin-bottom: 24px; }
  .goal-stats {
    background: white; border-radius: 20px; padding: 20px 24px;
    width: 100%; max-width: 320px; box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .goal-stat { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 8px; }
  .goal-stat-val { font-weight: 900; }
  .btn-retry {
    width: 100%; max-width: 320px; padding: 16px; border-radius: 30px;
    background: var(--pink); color: white; font-size: 18px; font-weight: 900;
    border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(244,139,162,.4);
  }

  /* mugu animation */
  @keyframes muguPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .mugu-pop { animation: muguPop .25s ease-out; }
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <div style="font-size:28px;margin-bottom:4px;">🍴</div>
  <div class="title">もぐもぐタイム！</div>
  <div class="subtitle">キャラクターをえらんでね</div>

  <div class="char-row">
    <div class="char-card" id="boyCard" onclick="selectChar('boy')">
      <img src="/mnt/user-data/uploads/5236.png" alt="男の子">
      <div class="char-label">👦 男の子</div>
    </div>
    <div class="char-card" id="girlCard" onclick="selectChar('girl')">
      <img src="/mnt/user-data/uploads/5238.png" alt="女の子">
      <div class="char-label">👧 女の子</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">目標時間は？</div>
    <div class="tab-row" id="timeTabs">
      <div class="tab selected" onclick="selectTime(10,this)">10分</div>
      <div class="tab" onclick="selectTime(20,this)">20分</div>
      <div class="tab" onclick="selectTime(30,this)">30分</div>
      <div class="tab" onclick="selectTime(40,this)">40分</div>
      <div class="tab" onclick="selectTime(50,this)">50分</div>
      <div class="tab" onclick="selectTime(60,this)">60分</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">目標の口数をえらんでね</div>
    <div class="counter-row">
      <button class="cnt-btn" onclick="changeGoal(-20)">−</button>
      <div class="cnt-val" id="goalVal">20</div>
      <div class="cnt-unit">口</div>
      <button class="cnt-btn" onclick="changeGoal(20)">＋</button>
    </div>
  </div>

  <button class="btn-next" id="btnNext" onclick="goToScreen2()" disabled>次へ →</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <div class="cam-title">📷 カメラ確認</div>

  <div class="cam-box">
    <video id="camVideo" autoplay muted playsinline></video>
    <div class="cam-placeholder" id="camPlaceholder">
      <div style="font-size:40px">📷</div>
      <div>カメラを起動してください</div>
    </div>
  </div>

  <div class="cam-status">
    <div class="dot" id="camDot"></div>
    <span id="camStatusText">カメラの許可が必要です</span>
  </div>

  <div class="sensitivity-row">
    <label>感度：</label>
    <input type="range" id="sensitivitySlider" min="1" max="10" value="6"
      oninput="document.getElementById('sensitivityVal').textContent=this.value;sensitivity=parseInt(this.value)">
    <span id="sensitivityVal">6</span>
  </div>

  <div class="preview-area">
    <div class="preview-char">
      <img id="previewImg" src="" alt="キャラクター">
    </div>
    <div>
      <div class="mugu-counter-preview" id="previewCount">0</div>
      <div class="preview-bubble">口を動かすと<br>キャラも<br>動くよ！</div>
    </div>
  </div>

  <div class="cam-hint">ブラウザのアドレスバーからカメラを許可してください。</div>

  <div class="btn-row">
    <button class="btn-start" onclick="startGame()">🍴 スタート！</button>
    <button class="btn-back" onclick="showScreen('s1')">← もどる</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <div class="hud">
    <div class="hud-badge hud-level" id="levelBadge">レベル 1</div>
    <div class="hud-badge hud-pt" id="ptBadge">⭐ 0 pt</div>
    <div class="hud-badge hud-goal" id="goalBadge">目標 20口</div>
  </div>

  <div class="char-img-wrap">
    <img id="gameCharImg" src="" alt="キャラクター">
  </div>

  <div class="speech-bubble" id="speechBubble">もぐもぐ名人！</div>

  <div class="count-label">食べた口数</div>
  <div class="count-display">
    <div class="count-main" id="biteCount">0</div>
    <div class="count-total" id="biteTotal">/ 20</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="mugu-row">
    <span>もぐもぐ</span>
    <div class="mugu-mini-bar">
      <div class="mugu-mini-fill" id="muguFill" style="width:0%"></div>
    </div>
    <span id="muguCountDisplay">0</span>
  </div>

  <div class="timer-display" id="timerDisplay">10:00</div>

  <button class="btn-mouth" id="btnMouth" onclick="onBite()">🍴 1口！</button>
</div>

<!-- GOAL SCREEN -->
<div class="screen" id="goalScreen">
  <div class="goal-stars">🎉⭐🎉</div>
  <div class="goal-title">ぜんぶたべたね！</div>
  <div class="goal-sub">すごい！もぐもぐ名人だ！</div>
  <img id="goalCharImg" src="" class="goal-char" alt="ゴール">
  <div class="goal-stats">
    <div class="goal-stat"><span>食べた口数</span><span class="goal-stat-val" id="finalBite">-</span></div>
    <div class="goal-stat"><span>もぐもぐ回数</span><span class="goal-stat-val" id="finalMugu">-</span></div>
    <div class="goal-stat"><span>かかった時間</span><span class="goal-stat-val" id="finalTime">-</span></div>
  </div>
  <button class="btn-retry" onclick="restart()">🔄 もういちど</button>
</div>

<script>
// ===== STATE =====
const IMAGES = {
  boy:  { n1:'5236.png', m1:'5237.png', n2:'5281.png', m2:'5280.png', goal:'5282.png' },
  girl: { n1:'5238.png', m1:'5239.png', n2:'5279.png', m2:'5278.png', goal:'5277.png' }
};
const BASE = '/mnt/user-data/uploads/';

let selectedChar = null;
let targetMinutes = 10;
let targetBites = 20;
let sensitivity = 6;

let biteCount = 0;
let muguCount = 0;
let muguSession = 0; // current mouth-chewing count (resets on bite btn)
let timerSeconds = 0;
let timerInterval = null;
let isMoguOpen = false; // is mouth currently detected open

// Camera / face detection
let videoEl, canvasEl, ctx;
let lastMouthArea = 0;
let cameraStream = null;
let detectionInterval = null;

// ===== SCREEN HELPER =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== SCREEN 1 =====
function selectChar(c) {
  selectedChar = c;
  document.getElementById('boyCard').classList.toggle('selected', c==='boy');
  document.getElementById('girlCard').classList.toggle('selected', c==='girl');
  updateNextBtn();
}
function selectTime(m, el) {
  targetMinutes = m;
  document.querySelectorAll('#s1 .tab').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
}
function changeGoal(d) {
  targetBites = Math.max(20, Math.min(200, targetBites + d));
  document.getElementById('goalVal').textContent = targetBites;
}
function updateNextBtn() {
  document.getElementById('btnNext').disabled = !selectedChar;
}

function goToScreen2() {
  showScreen('s2');
  const imgs = IMAGES[selectedChar];
  document.getElementById('previewImg').src = BASE + imgs.n1;
  startCamera();
}

// ===== SCREEN 2 - CAMERA =====
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    cameraStream = stream;
    const video = document.getElementById('camVideo');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camDot').classList.add('ok');
    document.getElementById('camStatusText').textContent = 'カメラ接続中';

    canvasEl = document.createElement('canvas');
    ctx = canvasEl.getContext('2d');
    detectionInterval = setInterval(() => detectMouth(video), 100);
  } catch(e) {
    document.getElementById('camStatusText').textContent = 'カメラを許可してください';
  }
}

function detectMouth(video) {
  if (!video.videoWidth) return;
  canvasEl.width = video.videoWidth;
  canvasEl.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // Simplified: analyze brightness variation in mouth region (lower center of face)
  const w = canvasEl.width, h = canvasEl.height;
  const rx = Math.floor(w * 0.3), ry = Math.floor(h * 0.6);
  const rw = Math.floor(w * 0.4), rh = Math.floor(h * 0.15);
  const data = ctx.getImageData(rx, ry, rw, rh).data;

  let bright = 0;
  for (let i = 0; i < data.length; i += 4) {
    bright += (data[i] + data[i+1] + data[i+2]) / 3;
  }
  const avg = bright / (data.length / 4);
  const threshold = 120 + (10 - sensitivity) * 8;
  const open = avg < threshold;

  if (open !== isMoguOpen) {
    isMoguOpen = open;
    if (open) onMoguDetected();
  }

  // Update preview char image
  const imgs = IMAGES[selectedChar];
  document.getElementById('previewImg').src = BASE + (open ? imgs.m1 : imgs.n1);
}

function onMoguDetected() {
  muguSession++;
  document.getElementById('previewCount').textContent = muguSession;
  updateScreen3MuguBar();
}

// ===== SCREEN 3 =====
function startGame() {
  stopDetection();
  biteCount = 0;
  muguCount = 0;
  muguSession = 0;
  timerSeconds = targetMinutes * 60;

  document.getElementById('goalBadge').textContent = '目標 ' + targetBites + '口';
  document.getElementById('biteTotal').textContent = '/ ' + targetBites;
  document.getElementById('levelBadge').textContent = 'レベル 1';
  document.getElementById('ptBadge').textContent = '⭐ 0 pt';

  updateScreen3();
  showScreen('s3');

  // Start timer
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimer();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);

  // Restart mouth detection for game screen
  if (cameraStream) {
    const v = document.getElementById('camVideo');
    detectionInterval = setInterval(() => detectMouthGame(v), 100);
  }
}

function detectMouthGame(video) {
  if (!video || !video.videoWidth) return;
  canvasEl.width = video.videoWidth;
  canvasEl.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  const w = canvasEl.width, h = canvasEl.height;
  const rx = Math.floor(w * 0.3), ry = Math.floor(h * 0.6);
  const rw = Math.floor(w * 0.4), rh = Math.floor(h * 0.15);
  const data = ctx.getImageData(rx, ry, rw, rh).data;
  let bright = 0;
  for (let i = 0; i < data.length; i += 4) bright += (data[i]+data[i+1]+data[i+2])/3;
  const avg = bright / (data.length / 4);
  const open = avg < (120 + (10 - sensitivity) * 8);

  if (open !== isMoguOpen) {
    isMoguOpen = open;
    if (open) {
      muguSession++;
      muguCount++;
      updateScreen3MuguBar();
      updateCharImage();
    }
  }
}

function onBite() {
  biteCount++;
  muguSession = 0; // reset per-bite mugu
  updateScreen3();
  animateBiteBtn();
  if (biteCount >= targetBites) {
    clearInterval(timerInterval);
    stopDetection();
    showGoal();
  }
}

function animateBiteBtn() {
  const b = document.getElementById('btnMouth');
  b.classList.remove('mugu-pop');
  void b.offsetWidth;
  b.classList.add('mugu-pop');
}

function updateScreen3() {
  document.getElementById('biteCount').textContent = biteCount;
  const pct = Math.min(100, Math.round(biteCount / targetBites * 100));
  document.getElementById('progressBar').style.width = pct + '%';
  updateCharImage();
  updatePoints();
  updateLevel();
}

function updateScreen3MuguBar() {
  const maxMugu = 30;
  const pct = Math.min(100, Math.round(muguSession / maxMugu * 100));
  document.getElementById('muguFill').style.width = pct + '%';
  document.getElementById('muguCountDisplay').textContent = muguSession;
  updateCharImage();
}

function updateCharImage() {
  const imgs = IMAGES[selectedChar];
  const half = targetBites / 2;
  let imgKey;
  if (biteCount >= targetBites) imgKey = 'goal';
  else if (biteCount >= half) imgKey = isMoguOpen ? 'm2' : 'n2';
  else imgKey = isMoguOpen ? 'm1' : 'n1';

  document.getElementById('gameCharImg').src = BASE + imgs[imgKey];

  // Speech bubble
  const speeches = ['もぐもぐ名人！','よく噛んでえらい！','おいしそう！','がんばれ！','もうちょっと！'];
  if (isMoguOpen) {
    document.getElementById('speechBubble').textContent = 'もぐもぐ…！';
  } else {
    const i = Math.min(Math.floor(biteCount / targetBites * speeches.length), speeches.length-1);
    document.getElementById('speechBubble').textContent = speeches[i];
  }
}

function updatePoints() {
  const pt = biteCount * 10 + muguCount;
  document.getElementById('ptBadge').textContent = '⭐ ' + pt + ' pt';
}

function updateLevel() {
  const lv = Math.floor(biteCount / 10) + 1;
  document.getElementById('levelBadge').textContent = 'レベル ' + lv;
}

function updateTimer() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ===== GOAL =====
function showGoal() {
  const imgs = IMAGES[selectedChar];
  document.getElementById('goalCharImg').src = BASE + imgs.goal;
  document.getElementById('finalBite').textContent = biteCount + '口';
  document.getElementById('finalMugu').textContent = muguCount + '回';
  const elapsed = targetMinutes * 60 - timerSeconds;
  const em = Math.floor(elapsed/60), es = elapsed%60;
  document.getElementById('finalTime').textContent =
    String(em).padStart(2,'0') + ':' + String(es).padStart(2,'0');
  showScreen('goalScreen');
}

function endGame() {
  stopDetection();
  showGoal();
}

function stopDetection() {
  if (detectionInterval) { clearInterval(detectionInterval); detectionInterval = null; }
}

function restart() {
  clearInterval(timerInterval);
  stopDetection();
  if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
  selectedChar = null;
  document.getElementById('boyCard').classList.remove('selected');
  document.getElementById('girlCard').classList.remove('selected');
  updateNextBtn();
  showScreen('s1');
}
</script>
</body>
</html>
