<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>もぐもぐタイム！</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FFF8F0;min-height:100vh;display:flex;justify-content:center;}
#root{width:100%;max-width:480px;padding:1.2rem 1rem 3rem;}
.screen{display:none;flex-direction:column;align-items:center;gap:1rem;}
.screen.on{display:flex;}
h1{font-size:22px;font-weight:700;color:#1a1a18;text-align:center;}
.sub{font-size:13px;color:#888;text-align:center;line-height:1.6;}
.divider{width:100%;height:1px;background:#E8E4DF;margin:.2rem 0;}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
/* ボタン */
.btn{padding:12px 28px;border-radius:14px;border:1.5px solid #D0C8C0;background:#fff;color:#1a1a18;font-size:15px;cursor:pointer;font-family:inherit;}
.btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.btn.primary:disabled{background:#A8DCC8;border-color:#A8DCC8;cursor:default;}
.btn.ghost{background:transparent;border-color:#ccc;color:#777;font-size:13px;padding:8px 18px;}
/* 画面1 */
.char-cards{display:flex;gap:18px;}
.ccard{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 18px;border-radius:20px;border:2.5px solid #D0C8C0;background:#fff;cursor:pointer;}
.ccard svg{width:84px;height:84px;}
.ccard-label{font-size:13px;font-weight:600;color:#888;}
.ccard.sel.boy{border-color:#5BA4D4;background:#EAF4FC;}
.ccard.sel.girl{border-color:#E07BAC;background:#FDF0F6;}
.ccard.sel.boy .ccard-label{color:#1E6FA0;}
.ccard.sel.girl .ccard-label{color:#C0467E;}
.age-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.atab{padding:9px 20px;border-radius:22px;border:1.5px solid #D0C8C0;background:#fff;color:#777;font-size:14px;cursor:pointer;font-family:inherit;}
.atab.sel{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.level-selector{display:flex;align-items:center;gap:14px;}
.level-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid #D0C8C0;background:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.level-val{font-size:32px;font-weight:700;color:#1a1a18;min-width:64px;text-align:center;}
.level-unit{font-size:14px;color:#888;}
/* 画面2 */
.cam-wrap{position:relative;width:260px;height:196px;}
.cam-wrap video{width:100%;height:100%;object-fit:cover;border-radius:18px;border:2px solid #D0C8C0;transform:scaleX(-1);}
/* 口領域のデバッグ枠（調整用・本番では非表示） */
.cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;pointer-events:none;opacity:0;}
.cam-status-bar{display:flex;align-items:center;gap:7px;font-size:13px;color:#555;}
.sdot{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sdot.on{background:#1D9E75;} .sdot.cal{background:#EF9F27;}
/* 感度調整スライダー */
.sens-row{display:flex;align-items:center;gap:10px;font-size:13px;color:#666;}
.sens-row input{width:120px;}
/* キャラエリア */
.char-area{display:flex;align-items:flex-end;gap:1rem;}
.chew-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.chew-col span{font-size:11px;color:#999;}
.chew-bar-wrap{width:16px;height:80px;background:#EDECEA;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;border:.5px solid #D0C8C0;}
.chew-bar{width:100%;background:#1D9E75;transition:height .08s;}
.chew-n{font-size:17px;font-weight:700;color:#1a1a18;}
.speech{background:#fff;border:1.5px solid #D0C8C0;border-radius:12px;padding:9px 12px;font-size:13px;color:#1a1a18;max-width:160px;line-height:1.5;}
/* 画面3 */
.badge-row{width:100%;display:flex;justify-content:space-between;}
.badge{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;}
.bg{background:#E1F5EE;border:1px solid #5DCAA5;color:#085041;}
.ba{background:#FAEEDA;border:1px solid #EF9F27;color:#412402;}
.br{background:#FCEAEA;border:1px solid #F09595;color:#501313;}
.bite-display{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bite-label{font-size:12px;color:#888;}
.bite-nums{display:flex;align-items:baseline;gap:6px;}
.bite-current{font-size:64px;font-weight:700;color:#1a1a18;line-height:1;font-variant-numeric:tabular-nums;}
.bite-sep{font-size:22px;color:#ccc;}
.bite-goal{font-size:28px;font-weight:600;color:#aaa;font-variant-numeric:tabular-nums;}
.bite-prog-wrap{width:100%;max-width:360px;height:18px;background:#EDECEA;border-radius:9px;overflow:hidden;}
.bite-prog-fill{height:100%;background:#EF9F27;border-radius:9px;transition:width .3s ease;}
.timer-num{font-size:42px;font-weight:500;color:#888;letter-spacing:1px;font-variant-numeric:tabular-nums;}
.chew-mini{display:flex;align-items:center;gap:8px;font-size:12px;color:#999;}
.chew-mini-bar-wrap{width:100px;height:10px;background:#EDECEA;border-radius:5px;overflow:hidden;}
.chew-mini-bar{height:100%;background:#1D9E75;transition:width .08s;border-radius:5px;}
.bite-btn{width:100%;max-width:320px;padding:20px;border-radius:20px;border:none;background:#EF9F27;color:#fff;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #B87520;-webkit-tap-highlight-color:transparent;}
.bite-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #B87520;}
.bite-btn:disabled{background:#ccc;box-shadow:none;cursor:default;}
.missions{width:100%;max-width:380px;display:flex;flex-direction:column;gap:6px;}
.mission{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;border:.5px solid #D0C8C0;background:#fff;}
.mission.done{opacity:.5;background:#F5F3F0;}
.mi{font-size:18px;width:26px;text-align:center;}
.mt{flex:1;font-size:13px;color:#1a1a18;}
.mp{font-size:12px;font-weight:500;color:#0F6E56;background:#E1F5EE;border-radius:10px;padding:2px 10px;}
.mission.done .mp{color:#888;background:#EDECEA;}
.stamps{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:32px;max-width:340px;}
.stamp{width:34px;height:34px;border-radius:50%;background:#E1F5EE;border:1.5px solid #5DCAA5;display:flex;align-items:center;justify-content:center;font-size:17px;animation:pop .3s;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.clear-box{padding:20px;border-radius:18px;border:2px solid #5DCAA5;background:#E1F5EE;text-align:center;font-size:15px;font-weight:600;color:#085041;display:none;width:100%;max-width:360px;line-height:2;}
.clear-box .emo{font-size:48px;display:block;margin-bottom:6px;}
.bounce{animation:bnc .4s ease;}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
</style>
</head>
<body>
<div id="root">

<!-- ========== 画面1 ========== -->

        <ellipse cx="27" cy="44" rx="5" ry="3" fill="#F4A0C0" opacity=".6"/>

        <path d="M36 50 Q44 56 52 50" stroke="#2C2C2A" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>

    </div>
  </div>
  <div class="divider"></div>
  <p class="sub">なんさい？</p>
  <div class="age-row">
    <button class="atab" onclick="pickAge(1)">1〜2歳</button>
    <button class="atab" onclick="pickAge(3)">3〜4歳</button>
    <button class="atab" onclick="pickAge(5)">5〜6歳</button>
  </div>
  <div class="divider"></div>
  <p class="sub">目標の口数をえらんでね</p>
  <div class="level-selector">
    <button class="level-btn" onclick="changeGoal(-20)">－</button>
    <div class="level-val" id="goalVal">20</div>
    <button class="level-btn" onclick="changeGoal(+20)">＋</button>
    <div class="level-unit">口</div>
  </div>
  <button class="btn primary" id="s1Next" onclick="goS2()" disabled>次へ →</button>
</div>

<script>
// ============================================================
// ★ 外部ライブラリ不使用 ★
// 口の検出：Canvas で映像をピクセル取得 →
// 顔下半分（口元）の輝度変化をフレーム差分で検出
// ============================================================

const CFGS = {
  1:{mins:5,missions:[
    {id:'b5',    icon:'🍚',text:'5口食べた！',    pts:8, done:false},
    {id:'chew30',icon:'👄',text:'30回もぐもぐ！', pts:5, done:false},
    {id:'clear', icon:'🎉',text:'目標口数クリア！',pts:20,done:false},
  ]},
  3:{mins:10,missions:[
    {id:'b5',    icon:'🍚',text:'5口食べた！',    pts:5, done:false},
    {id:'b10',   icon:'🍱',text:'10口食べた！',   pts:8, done:false},
    {id:'chew50',icon:'👄',text:'50回もぐもぐ！', pts:8, done:false},
    {id:'clear', icon:'🎉',text:'目標口数クリア！',pts:25,done:false},
  ]},
  5:{mins:15,missions:[
    {id:'b5',     icon:'🍚',text:'5口食べた！',    pts:5, done:false},
    {id:'b10',    icon:'🍱',text:'10口食べた！',   pts:8, done:false},
    {id:'b20',    icon:'💪',text:'20口食べた！',   pts:12,done:false},
    {id:'chew100',icon:'👄',text:'100回もぐもぐ！',pts:10,done:false},
    {id:'clear',  icon:'🎉',text:'目標口数クリア！',pts:30,done:false},
  ]},
};
const STAMPS=['🍙','🥕','🐟','🍠','🥦','🍳','🍜','🍱','🍎','🥚'];
const SPEECH_CHEW=['もぐもぐ！えらい！','おいしいかな？','よくかんでね！','もぐもぐ名人！','上手！'];
const SPEECH_BITE=['1口たべたね！','えらい！','どんどん食べよう！','おいしい？','すごい！'];

// 状態
let charType=null,ageKey=null,goalBites=20;
let cfg=null,totalSec=0,remaining=0,timerInt=null;
let points=0,stampArr=[],chewCount=0,biteCount=0,cleared=false;

// カメラ・検出
let stream=null, rafId=null;
let offCanvas=null, offCtx=null; // オフスクリーンCanvas
let prevBrightness=null;         // 前フレームの輝度
let smoothed=0;                  // 平滑化した変化量
let inPeak=false;
let sensitivity=6;               // 感度（スライダーで変更可）
let calFrames=0;                 // キャリブレーションフレーム数

const $=id=>document.getElementById(id);
const S1=$('s1'),S2=$('s2'),S3=$('s3');
function showScreen(s){[S1,S2,S3].forEach(x=>x.classList.remove('on'));s.classList.add('on');}

// ============================================================
// 画面1
// ============================================================
function pickChar(t){
  charType=t;
  $('cBoy').className ='ccard boy' +(t==='boy' ?' sel':'');
  $('cGirl').className='ccard girl'+(t==='girl'?' sel':'');
  checkS1();
}
function pickAge(a){
  ageKey=a;
  document.querySelectorAll('.atab').forEach((el,i)=>el.classList.toggle('sel',[1,3,5][i]===a));
  checkS1();
}
function changeGoal(d){
  goalBites=Math.max(20,Math.min(200,goalBites+d));
  $('goalVal').textContent=goalBites;
}
function checkS1(){$('s1Next').disabled=!(charType&&ageKey);}
function goS1(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  stopDetection();
  charType=null;ageKey=null;
  $('cBoy').className='ccard boy';$('cGirl').className='ccard girl';
  document.querySelectorAll('.atab').forEach(el=>el.classList.remove('sel'));
  $('s1Next').disabled=true;
  showScreen(S1);
}

// ============================================================
// 画面2
// ============================================================
function goS2(){
  applyCharStyle('c2');
  chewCount=0;updateChewUI();
  prevBrightness=null;smoothed=0;inPeak=false;calFrames=0;
  showScreen(S2);
  startCamera();
}

// ============================================================
// キャラ外見
// ============================================================
function applyCharStyle(p){
  const b=charType==='boy';
  $(p+'body').setAttribute('fill',b?'#5BA4D4':'#E07BAC');
  [p+'hb',p+'hbL',p+'hbR'].forEach(id=>{const e=$(id);if(e)e.setAttribute('opacity',b?'1':'0');});
  if(!b){
    $(p+'hairBack').setAttribute('d','M26 22 Q20 64 28 88 Q40 96 60 96 Q80 96 92 88 Q100 64 94 22 Q90 14 60 14 Q30 14 26 22Z');
    $(p+'hairBack').setAttribute('opacity','1');
    $(p+'hg').setAttribute('d','M26 48 Q26 16 60 16 Q94 16 94 48');
    $(p+'hg').setAttribute('opacity','1');
  }else{
    $(p+'hairBack').setAttribute('d','');$(p+'hairBack').setAttribute('opacity','0');
    $(p+'hg').setAttribute('d','');$(p+'hg').setAttribute('opacity','0');
  }
  $(p+'ribbon').setAttribute('opacity',b?'0':'1');
  const l=$(p+'lash');if(l)l.setAttribute('opacity',b?'0':'1');
  $(p+'chkL').setAttribute('opacity',b?'0':'0.55');
  $(p+'chkR').setAttribute('opacity',b?'0':'0.55');
}

// ============================================================
// 口SVG
// ============================================================
function setMouth(p,ratio){
  const by=69,oy=82,y=by+(oy-by)*ratio,ry=4+7*ratio;
  $(p+'jaw').setAttribute('cy',y.toFixed(2));
  $(p+'jaw').setAttribute('ry',ry.toFixed(2));
  $(p+'lip').setAttribute('d',`M50 ${by} Q60 ${(y+6*ratio).toFixed(2)} 70 ${by}`);
}
function applyMouth(r){setMouth('c2',r);setMouth('c3',r);}

// ============================================================
// もぐもぐUI
// ============================================================
function updateChewUI(){
  $('chewBar2').style.height =Math.min(100,chewCount)+'%';
  $('chewN2').textContent    =chewCount;
  $('chewMiniBar').style.width=Math.min(100,chewCount)+'%';
  $('chewMiniN').textContent =chewCount;
}

// ============================================================
// ★ カメラ起動（外部ライブラリ不使用）
// ============================================================
async function startCamera(){
  $('sdot').className='sdot cal';
  $('stext').textContent='カメラを起動しています...';
  $('calNotice').textContent='';
  $('s2Start').disabled=true;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:320},height:{ideal:240}},
      audio:false
    });
    const video=$('video');
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    await video.play();

    // オフスクリーンCanvas（輝度取得用・小さくして軽量化）
    offCanvas=document.createElement('canvas');
    offCanvas.width=40; offCanvas.height=40;
    offCtx=offCanvas.getContext('2d',{willReadFrequently:true});

    $('sdot').className='sdot on';
    $('stext').textContent='顔をカメラに向けてください';
    $('calNotice').textContent='キャリブレーション中… 0/30';

    startDetection(video);
  }catch(e){
    $('sdot').className='sdot';
    $('stext').textContent='カメラの許可が必要です';
    $('calNotice').textContent=
      e.name==='NotAllowedError'
        ?'ブラウザのアドレスバー左のアイコンからカメラを許可してください。'
        :'エラー: '+e.message;
  }
}

// ============================================================
// ★ 口の動き検出（フレーム差分法）
// ============================================================
function startDetection(video){
  // 顔下半分（画面の50〜80%の高さ、横は20〜80%）を口元エリアとして使用
  // 40x40pxに縮小してRチャンネル平均輝度を計算
  function getROIBrightness(){
    const vw=video.videoWidth||320, vh=video.videoHeight||240;
    const sx=vw*0.20, sy=vh*0.50, sw=vw*0.60, sh=vh*0.30;
    offCtx.drawImage(video, sx,sy,sw,sh, 0,0,40,40);
    const d=offCtx.getImageData(0,0,40,40).data;
    let sum=0;
    for(let i=0;i<d.length;i+=4) sum+=d[i]; // Rチャンネル
    return sum/(40*40);
  }

  let prevVal=null;
  const CALIB_FRAMES=30;
  let baselineDiff=0, baselineSamples=[];

  function loop(){
    rafId=requestAnimationFrame(loop);
    if(video.readyState<2) return;

    const cur=getROIBrightness();
    if(prevVal===null){prevVal=cur;return;}

    const diff=Math.abs(cur-prevVal);
    prevVal=cur;

    // 平滑化（ノイズ除去）
    smoothed=smoothed*0.7+diff*0.3;

    // キャリブレーション（最初30フレームでベースラインのばらつきを測定）
    if(calFrames<CALIB_FRAMES){
      baselineSamples.push(smoothed);
      calFrames++;
      $('calNotice').textContent=`キャリブレーション中… ${calFrames}/${CALIB_FRAMES}`;
      return;
    }
    if(calFrames===CALIB_FRAMES){
      // ベースラインノイズ = 平均の1.5倍を閾値に
      baselineDiff=baselineSamples.reduce((a,b)=>a+b,0)/baselineSamples.length;
      calFrames++;
      $('calNotice').textContent='準備OK！口を動かしてみてね 🟢';
      $('s2Start').disabled=false;
    }

    // 感度を加味した閾値
    const threshold = Math.max(0.3, baselineDiff * (12 - sensitivity));

    // ピーク検出でもぐもぐカウント
    if(!inPeak && smoothed>threshold){
      inPeak=true;
      applyMouth(0.85); // 口を開く
    } else if(inPeak && smoothed<threshold*0.4){
      inPeak=false;
      applyMouth(0);    // 口を閉じる
      chewCount++;
      updateChewUI();
      if(chewCount>=30)  completeMission('chew30');
      if(chewCount>=50)  completeMission('chew50');
      if(chewCount>=100) completeMission('chew100');
      if(chewCount%10===0) setSpeech(SPEECH_CHEW[Math.floor(Math.random()*SPEECH_CHEW.length)]);
    }
  }
  loop();
}

function stopDetection(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
}

// ============================================================
// 口数ボタン
// ============================================================
function addBite(){
  if(cleared)return;
  biteCount++;
  $('biteCount').textContent=biteCount;
  $('biteProgFill').style.width=Math.min(100,Math.round(biteCount/goalBites*100))+'%';
  chewCount=0;updateChewUI();
  bounceChar();
  setSpeech(SPEECH_BITE[Math.floor(Math.random()*SPEECH_BITE.length)]);
  if(biteCount>=5)  completeMission('b5');
  if(biteCount>=10) completeMission('b10');
  if(biteCount>=20) completeMission('b20');
  if(biteCount>=goalBites)showClear();
}

// ============================================================
// クリア / タイムアップ
// ============================================================
function showClear(){
  if(cleared)return;
  cleared=true;
  clearInterval(timerInt);timerInt=null;
  completeMission('clear');
  const lv=points<30?1:points<70?2:points<120?3:4;
  $('clearBox').style.cssText='display:block;border-color:#5DCAA5;background:#E1F5EE;';
  $('clearBox').querySelector('.emo').textContent='🎉';
  $('clearMsg').innerHTML=`${goalBites}口ぜんぶたべたね！<br>⭐ ${points}pt　レベル${lv}<br>もぐもぐ${chewCount}回！`;
  setSpeech('やったー！ぜんぶたべた！🎉');
  bounceChar();
  $('biteBtn').disabled=true;
}
function timeUp(){
  $('biteBtn').disabled=true;
  $('clearBox').style.cssText='display:block;border-color:#EF9F27;background:#FAEEDA;color:#412402;';
  $('clearBox').querySelector('.emo').textContent='⏰';
  $('clearMsg').innerHTML=`時間切れ！${biteCount}口たべたね！<br>次はクリアしよう！<br>⭐ ${points}pt`;
  setSpeech('よくがんばったね！');
}

// ============================================================
// 画面3
// ============================================================
function goS3(){
  applyCharStyle('c3');
  cfg=JSON.parse(JSON.stringify(CFGS[ageKey]));
  totalSec=cfg.mins*60;remaining=totalSec;
  points=0;stampArr=[];chewCount=0;biteCount=0;cleared=false;
  $('ptBadge').textContent='⭐ 0 pt';
  $('lvBadge').textContent='レベル 1';
  $('goalBadge').textContent=`目標 ${goalBites}口`;
  $('biteGoalDisp').textContent=goalBites;
  $('biteCount').textContent='0';
  $('biteProgFill').style.width='0%';
  $('stampsEl').innerHTML='';
  $('clearBox').style.display='none';
  $('biteBtn').disabled=false;
  updateChewUI();renderMissions();updateTimer();
  showScreen(S3);
  timerInt=setInterval(()=>{
    remaining--;updateTimer();
    if(Math.random()<0.04)blink();
    if(remaining<=0&&!cleared){clearInterval(timerInt);timerInt=null;timeUp();}
  },1000);
}

// ============================================================
// ミッション・ポイント・スタンプ
// ============================================================
function updateTimer(){
  $('timerEl').textContent=
    String(Math.floor(remaining/60)).padStart(2,'0')+':'+
    String(remaining%60).padStart(2,'0');
}
function renderMissions(){
  $('missionEl').innerHTML='';
  cfg.missions.forEach(m=>{
    const d=document.createElement('div');
    d.className='mission'+(m.done?' done':'');
    d.id='ms-'+m.id;
    d.innerHTML=`<div class="mi">${m.done?'✅':m.icon}</div>`+
                `<div class="mt">${m.text}</div>`+
                `<div class="mp">${m.done?'クリア！':'+'+m.pts+'pt'}</div>`;
    $('missionEl').appendChild(d);
  });
}
function completeMission(id){
  const m=cfg?.missions.find(x=>x.id===id);
  if(!m||m.done)return;
  m.done=true;addPoints(m.pts);addStamp();renderMissions();
}
function addPoints(p){
  points+=p;
  $('ptBadge').textContent='⭐ '+points+' pt';
  $('lvBadge').textContent='レベル '+(points<30?1:points<70?2:points<120?3:4);
}
function addStamp(){
  const s=document.createElement('div');
  s.className='stamp';s.textContent=STAMPS[stampArr.length%STAMPS.length];
  $('stampsEl').appendChild(s);stampArr.push(s);
}
function bounceChar(){
  [$('charSvg2'),$('charSvg3')].forEach(el=>{
    if(!el)return;
    el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce');
    setTimeout(()=>el.classList.remove('bounce'),400);
  });
}
function setSpeech(msg){$('speech2').textContent=msg;$('speech3').textContent=msg;}
function blink(){
  [['c2eL','c2eR'],['c3eL','c3eR']].forEach(([l,r])=>{
    const eL=$(l),eR=$(r);if(!eL||!eR)return;
    eL.setAttribute('ry','1');eR.setAttribute('ry','1');
    setTimeout(()=>{eL.setAttribute('ry','6');eR.setAttribute('ry','6');},140);
  });
}
</script>
