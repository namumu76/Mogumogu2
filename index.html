<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>もぐもぐタイム！</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F7F5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:1.5rem 1rem 3rem;}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:1.1rem;}

/* ===== 共通 ===== */
h1{font-size:20px;font-weight:700;color:#1a1a18;letter-spacing:.5px;text-align:center;}
.screen{width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.hidden{display:none!important;}
.badge{border-radius:20px;padding:5px 16px;font-size:13px;font-weight:500;}
.bg{background:#E1F5EE;border:1px solid #5DCAA5;color:#085041;}
.ba{background:#FAEEDA;border:1px solid #EF9F27;color:#412402;}
.top-bar{width:100%;display:flex;justify-content:space-between;}
.section-label{font-size:12px;font-weight:600;color:#888;letter-spacing:.8px;text-transform:uppercase;align-self:flex-start;}
.btn{padding:11px 26px;border-radius:12px;border:1.5px solid #D0CEC8;background:#fff;color:#1a1a18;font-size:15px;cursor:pointer;font-family:inherit;transition:background .15s;}
.btn:hover{background:#F0EEEC;}
.btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.btn.primary:hover{background:#0F6E56;}
.btn.primary:disabled{background:#9FE1CB;border-color:#9FE1CB;cursor:default;}
.btn.ghost{background:transparent;border-color:#D0CEC8;color:#666;font-size:13px;padding:8px 18px;}
.btn.ghost:hover{background:#F0EEEC;}

/* ===== 画面1：キャラクター・年齢選択 ===== */
.char-select{display:flex;gap:20px;justify-content:center;}
.char-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:14px 20px;border-radius:18px;border:2.5px solid #D0CEC8;background:#fff;transition:all .18s;user-select:none;}
.char-card:hover{border-color:#aaa;}
.char-card.active.boy{border-color:#5BA4D4;background:#EAF4FC;}
.char-card.active.girl{border-color:#E07BAC;background:#FDF0F6;}
.char-card svg{width:80px;height:80px;}
.char-card-label{font-size:14px;font-weight:600;color:#555;}
.char-card.active.boy .char-card-label{color:#2C6EA0;}
.char-card.active.girl .char-card-label{color:#C0467E;}

.age-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.tab{padding:8px 20px;border-radius:20px;border:1.5px solid #D0CEC8;background:#fff;color:#666;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}

/* ===== 画面2：カメラ確認 ===== */
.cam-box{position:relative;width:260px;height:195px;border-radius:16px;overflow:hidden;border:2px solid #D0CEC8;background:#111;}
video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-status{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:#fff;background:rgba(0,0,0,.6);padding:3px 10px;border-radius:10px;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dot.on{background:#1D9E75;}
.dot.chewing{background:#EF9F27;animation:pulse .4s infinite alternate;}
@keyframes pulse{from{opacity:.5;}to{opacity:1;}}

.preview-row{display:flex;align-items:flex-end;gap:1.2rem;justify-content:center;}
.preview-bubble{background:#fff;border:1.5px solid #D0CEC8;border-radius:12px;padding:8px 14px;font-size:13px;color:#1a1a18;max-width:160px;min-height:36px;display:flex;align-items:center;line-height:1.5;}
.chew-indicator{display:flex;flex-direction:column;align-items:center;gap:4px;}
.chew-bar-wrap{width:14px;height:60px;background:#EDECEA;border-radius:7px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;border:.5px solid #D0CEC8;}
.chew-bar-fill{width:100%;background:#1D9E75;border-radius:7px;transition:height .1s;}
.chew-bar-label{font-size:10px;color:#888;}

/* ===== 画面3：ゲーム ===== */
.game-char-wrap{display:flex;align-items:flex-end;gap:1.2rem;justify-content:center;}
svg.char-lg{width:130px;height:130px;}
.game-bubble{background:#fff;border:1.5px solid #D0CEC8;border-radius:12px;padding:9px 14px;font-size:13px;color:#1a1a18;max-width:200px;min-height:38px;display:flex;align-items:center;line-height:1.5;}
.chew-meter{display:flex;flex-direction:column;align-items:center;gap:4px;}
.chew-label{font-size:11px;color:#888;}
.chew-wrap{width:16px;height:90px;background:#EDECEA;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;border:.5px solid #D0CEC8;}
.chew-fill{width:100%;background:#1D9E75;border-radius:8px;transition:height .1s;}
.chew-num{font-size:16px;font-weight:700;color:#1a1a18;}

.timer-num{font-size:56px;font-weight:500;color:#1a1a18;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.bar-wrap{width:100%;max-width:380px;height:20px;background:#EDECEA;border-radius:10px;overflow:hidden;border:.5px solid #D0CEC8;}
.bar-fill{height:100%;border-radius:10px;background:#1D9E75;transition:width .6s linear;}

.missions{width:100%;max-width:380px;display:flex;flex-direction:column;gap:6px;}
.mission{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:.5px solid #D0CEC8;background:#fff;}
.mission.done{opacity:.5;background:#F7F7F5;}
.mi{font-size:18px;width:26px;text-align:center;}
.mt{flex:1;font-size:13px;color:#1a1a18;}
.mp{font-size:12px;font-weight:500;color:#0F6E56;background:#E1F5EE;border-radius:10px;padding:2px 10px;}
.mission.done .mp{color:#888;background:#EDECEA;}

.stamp-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px;min-height:36px;}
.stamp{width:36px;height:36px;border-radius:50%;background:#E1F5EE;border:1.5px solid #5DCAA5;display:flex;align-items:center;justify-content:center;font-size:18px;animation:pop .35s;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}

.result{padding:16px 22px;border-radius:12px;border:1.5px solid #5DCAA5;background:#E1F5EE;text-align:center;font-size:15px;font-weight:500;color:#085041;display:none;width:100%;max-width:380px;line-height:1.9;}

.bounce{animation:bnc .4s ease;}
@keyframes bnc{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
</style>
</head>

    {id:'half',icon:'⏰',text:'半分まで食べた！',pts:8,done:false},
    {id:'c100',icon:'💪',text:'100回もぐもぐ達成！',pts:20,done:false},
    {id:'fin',icon:'🎉',text:'ぜんぶたべた！',pts:30,done:false},
  ]},
};
const STAMPS=['🍙','🥕','🐟','🍠','🥦','🍳','🍜','🍱','🍎','🥚'];
const MSGS=['もぐもぐ！えらい！','おいしいかな？','すごい！どんどん食べてる！','もう少しだよ！','もぐもぐ名人！'];

// ===== 状態 =====
let currentChar=null, age=null, cfg=null;
let totalSec=0, remaining=0, timerInt=null;
let points=0, stampArr=[], halfDone=false;
let chewCount=0;
let camReady=false;

// ===== 顎検出用 =====
let jawHistory=[], jawBaseline=null, inChewMotion=false;
const JAW_HISTORY=6, CHEW_THRESH=0.012;

// ===== DOM =====
const $=id=>document.getElementById(id);
const video=$('video'), dot=$('dot'), camTxt=$('camTxt');

// ===== 画面遷移 =====
function showScreen(n){
  ['screen1','screen2','screen3'].forEach((id,i)=>{
    $(id).classList.toggle('hidden', i+1!==n);
  });
}
function goScreen1(){ showScreen(1); }
function goScreen2(){
  if(!currentChar||!age) return;
  applyCharToSvg('pre'); // 画面2のプレビューに適用
  showScreen(2);
}
function goScreen3(){ showScreen(3); }

// ===== 画面1：選択 =====
function selectChar(type){
  currentChar=type;
  $('cardBoy').className='char-card boy'+(type==='boy'?' active':'');
  $('cardGirl').className='char-card girl'+(type==='girl'?' active':'');
  checkScreen1Ready();
}
function setAge(a){
  age=a;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',[1,3,5][i]===a));
  checkScreen1Ready();
}
function checkScreen1Ready(){
  $('toScreen2Btn').disabled=!(currentChar&&age);
}

// ===== SVGにキャラクター適用（prefix: 'pre_' or 'g_'） =====
function applyCharToSvg(prefix){
  const isBoy = currentChar==='boy';
  const p = prefix==='pre' ? 'pre_' : 'g_';

  $(p+'body').setAttribute('fill', isBoy?'#5BA4D4':'#E07BAC');

  // 男の子の前髪
  $(p+'hairBoyFront').setAttribute('opacity', isBoy?'1':'0');
  $(p+'hairBoyL').setAttribute('opacity', isBoy?'1':'0');
  $(p+'hairBoyR').setAttribute('opacity', isBoy?'1':'0');

  // 女の子の髪
  if(!isBoy){
    $(p+'hairBack').setAttribute('d','M26 24 Q20 62 26 88 Q38 96 60 96 Q82 96 94 88 Q100 62 94 24 Q90 14 60 14 Q30 14 26 24Z');
    $(p+'hairBack').setAttribute('opacity','1');
    $(p+'hairGirlFront').setAttribute('d','M26 48 Q26 16 60 16 Q94 16 94 48');
    $(p+'hairGirlFront').setAttribute('opacity','1');
  } else {
    $(p+'hairBack').setAttribute('d','');
    $(p+'hairBack').setAttribute('opacity','0');
    $(p+'hairGirlFront').setAttribute('d','');
    $(p+'hairGirlFront').setAttribute('opacity','0');
  }

  $(p+'ribbon').setAttribute('opacity', isBoy?'0':'1');
  $(p+'lashes').setAttribute('opacity', isBoy?'0':'1');
  $(p+'cheekL').setAttribute('opacity', isBoy?'0':'0.55');
  $(p+'cheekR').setAttribute('opacity', isBoy?'0':'0.55');
}

// ===== 口の動き：両方のSVGに反映 =====
function setMouth(ratio){
  // 画面2プレビュー
  _setMouthSvg('pre_', ratio);
  // 画面3ゲーム
  _setMouthSvg('g_', ratio);
}
function _setMouthSvg(p, ratio){
  const baseY=68, openY=80;
  const y = baseY + (openY-baseY)*ratio;
  const ry = 3 + 6*ratio;
  $(p+'jaw').setAttribute('cy', y.toFixed(1));
  $(p+'jaw').setAttribute('ry', ry.toFixed(1));
  $(p+'lowerlip').setAttribute('d', `M50 ${baseY} Q60 ${(y+5*ratio).toFixed(1)} 70 ${baseY}`);
}

// ===== 咀嚼カウント =====
function onChew(){
  chewCount++;
  // 画面2
  $('preChewFill').style.height = Math.min(100,chewCount*5)+'%';
  // 画面3
  $('chewNum').textContent = chewCount;
  $('chewFill').style.height = Math.min(100,chewCount)+'%';
  // ドット点滅
  dot.className='dot chewing';
  setTimeout(()=>dot.className='dot on',300);
  $('previewBubble').textContent=MSGS[Math.floor(Math.random()*MSGS.length)];

  if(timerInt){ // ゲーム中のみミッションチェック
    checkChew();
    bounceChar();
    if(chewCount%10===0) setBubble();
  }
}

// ===== 顔検出 =====
function onResults(res){
  if(!res.multiFaceLandmarks?.length){
    dot.className='dot'; camTxt.textContent='顔が見えないよ';
    setMouth(0); jawHistory=[]; inChewMotion=false; return;
  }
  dot.className='dot on'; camTxt.textContent='検出中';
  const lm=res.multiFaceLandmarks[0];
  const faceH=Math.abs(lm[152].y-lm[1].y)||0.3;

  // 口の開き → キャラクターの口に即時反映
  const lipDist=(lm[14].y-lm[13].y)/faceH;
  const lipRatio=Math.min(1,Math.max(0,(lipDist-0.04)/0.14));
  setMouth(lipRatio);

  // 顎の動き → 咀嚼カウント（口閉じても検知）
  const jawDist=(lm[152].y-lm[164].y)/faceH;

  // ベースライン確定（最初の10フレーム）
  if(jawBaseline===null){
    jawHistory.push(jawDist);
    if(jawHistory.length>=10){
      jawBaseline=jawHistory.reduce((a,b)=>a+b,0)/jawHistory.length;
      jawHistory=[];
      camTxt.textContent='準備完了！';
    }
    return;
  }

  jawHistory.push(jawDist);
  if(jawHistory.length>JAW_HISTORY) jawHistory.shift();
  if(jawHistory.length<JAW_HISTORY) return;

  const delta=jawDist-jawBaseline;

  if(!inChewMotion && delta>CHEW_THRESH){
    inChewMotion=true;
  } else if(inChewMotion && delta<CHEW_THRESH*0.4){
    inChewMotion=false;
    onChew();
  }

  // ベースラインをゆっくり追従（姿勢ずれ補正）
  jawBaseline=jawBaseline*0.98+jawDist*0.02;
}

// ===== カメラ起動 =====
async function startCam(){
  $('camBtn').disabled=true;
  camTxt.textContent='起動中...';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    video.srcObject=stream;
    const fm=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.6});
    fm.onResults(onResults);
    new Camera(video,{onFrame:async()=>fm.send({image:video}),width:320,height:240}).start();
    camReady=true;
    dot.className='dot on'; camTxt.textContent='ベースライン計測中...';
    $('startBtn').disabled=false;
  }catch(e){
    camTxt.textContent='エラー：許可してください';
    $('camBtn').disabled=false;
  }
}

// ===== ゲームスタート =====
function startGame(){
  // 画面3のキャラクターにも適用
  applyCharToSvg('g');
  cfg=JSON.parse(JSON.stringify(CFGS[age]));
  totalSec=cfg.mins*60; remaining=totalSec;
  chewCount=0; halfDone=false; points=0; stampArr=[];
  $('chewNum').textContent='0';
  $('chewFill').style.height='0%';
  $('ptBadge').textContent='⭐ 0 pt';
  $('lvBadge').textContent='レベル 1';
  $('stampGrid').innerHTML='';
  $('result').style.display='none';
  renderMissions();
  updateDisplay();
  goScreen3();
  $('gameBubble').textContent='もぐもぐスタート！';

  timerInt=setInterval(()=>{
    remaining--; updateDisplay();
    if(!halfDone&&remaining<=totalSec/2){halfDone=true;complete('half');}
    // たまにまばたき
    if(Math.random()<0.04){
      $('g_eL').setAttribute('ry','1');$('g_eR').setAttribute('ry','1');
      setTimeout(()=>{$('g_eL').setAttribute('ry','6');$('g_eR').setAttribute('ry','6');},150);
    }
    if(remaining<=0){clearInterval(timerInt);timerInt=null;finish();}
  },1000);
}

// ===== ミッション =====
function renderMissions(){
  $('missionList').innerHTML='';
  cfg?.missions.forEach(m=>{
    const d=document.createElement('div');
    d.className='mission'+(m.done?' done':'');
    d.id='m-'+m.id;
    d.innerHTML=`<div class="mi">${m.done?'✅':m.icon}</div><div class="mt">${m.text}</div><div class="mp">${m.done?'クリア!':'+'+m.pts+'pt'}</div>`;
    $('missionList').appendChild(d);
  });
}
function complete(id){
  const m=cfg?.missions.find(x=>x.id===id);
  if(!m||m.done)return;
  m.done=true; addPts(m.pts); addStamp(); setBubble(); bounceChar(); renderMissions();
}
function checkChew(){
  const ids={c20:20,c30:30,c50:50,c60:60,c100:100};
  Object.entries(ids).forEach(([id,n])=>{if(chewCount>=n)complete(id);});
}
function addPts(p){
  points+=p; $('ptBadge').textContent='⭐ '+points+' pt';
  $('lvBadge').textContent='レベル '+(points<30?1:points<70?2:points<120?3:4);
}
function addStamp(){
  const s=document.createElement('div');
  s.className='stamp'; s.textContent=STAMPS[stampArr.length%STAMPS.length];
  $('stampGrid').appendChild(s); stampArr.push(s);
}

// ===== UI更新 =====
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function updateDisplay(){
  $('timerEl').textContent=remaining>=0?fmt(remaining):'00:00';
  $('barFill').style.width=Math.round(totalSec>0?(remaining/totalSec)*100:0)+'%';
}
function setBubble(){$('gameBubble').textContent=MSGS[Math.floor(Math.random()*MSGS.length)];}
function bounceChar(){
  const svg=$('charSvg');
  svg.classList.remove('bounce');
  void svg.offsetWidth;
  svg.classList.add('bounce');
  setTimeout(()=>svg.classList.remove('bounce'),400);
}

// ===== 終了 =====
function finish(){
  complete('fin');
  $('gameBubble').textContent='やったー！ごはんかんりょう！';
  bounceChar();
  const lv=points<30?1:points<70?2:points<120?3:4;
  const r=$('result');
  r.style.display='block';
  r.innerHTML=`🎉 ごはんかんりょう！<br>⭐ ${points}pt　レベル${lv}　もぐもぐ${chewCount}回　スタンプ×${stampArr.length}`;
}

// ===== リセット =====
function resetAll(){
  clearInterval(timerInt); timerInt=null;
  points=0; stampArr=[]; age=null; cfg=null; currentChar=null;
  chewCount=0; halfDone=false;
  jawHistory=[]; jawBaseline=null; inChewMotion=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('cardBoy').className='char-card boy';
  $('cardGirl').className='char-card girl';
  $('toScreen2Btn').disabled=true;
  $('startBtn').disabled=true;
  setMouth(0);
  showScreen(1);
}
</script>
</body>
</html>
