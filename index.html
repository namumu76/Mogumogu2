<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>もぐもぐタイム！</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FFF8F0;min-height:100vh;display:flex;justify-content:center;}
#root{width:100%;max-width:480px;padding:1.2rem 1rem 3rem;}

/* ===== 共通 ===== */
.screen{display:none;flex-direction:column;align-items:center;gap:1.1rem;}
.screen.on{display:flex;}
h1{font-size:22px;font-weight:700;color:#1a1a18;text-align:center;}
.sub{font-size:13px;color:#888;text-align:center;line-height:1.6;}
.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.divider{width:100%;height:1px;background:#E8E4DF;margin:.2rem 0;}

/* ===== ボタン ===== */
.btn{padding:12px 30px;border-radius:14px;border:1.5px solid #D0C8C0;background:#fff;color:#1a1a18;font-size:15px;cursor:pointer;font-family:inherit;}
.btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.btn.primary:disabled{background:#A8DCC8;border-color:#A8DCC8;cursor:default;}
.btn.ghost{background:transparent;border-color:#ccc;color:#777;font-size:13px;padding:8px 18px;}

/* ===== 画面1: キャラ・年齢選択 ===== */
.char-cards{display:flex;gap:20px;}
.ccard{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 22px;border-radius:20px;border:2.5px solid #D0C8C0;background:#fff;cursor:pointer;transition:all .15s;}
.ccard svg{width:88px;height:88px;}
.ccard-label{font-size:13px;font-weight:600;color:#888;}
.ccard.sel.boy{border-color:#5BA4D4;background:#EAF4FC;}
.ccard.sel.girl{border-color:#E07BAC;background:#FDF0F6;}
.ccard.sel.boy .ccard-label{color:#1E6FA0;}
.ccard.sel.girl .ccard-label{color:#C0467E;}
.age-row{display:flex;gap:10px;}
.atab{padding:9px 22px;border-radius:22px;border:1.5px solid #D0C8C0;background:#fff;color:#777;font-size:14px;cursor:pointer;font-family:inherit;}
.atab.sel{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}

/* ===== 画面2: カメラ確認 ===== */
.cam-frame{position:relative;width:260px;height:196px;border-radius:18px;overflow:hidden;border:2px solid #D0C8C0;background:#111;flex-shrink:0;}
.cam-frame video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-status-bar{display:flex;align-items:center;gap:7px;font-size:13px;color:#555;}
.sdot{width:10px;height:10px;border-radius:50%;background:#ccc;}
.sdot.on{background:#1D9E75;}
.sdot.cal{background:#EF9F27;}

/* ===== キャラクターエリア ===== */
.char-area{display:flex;align-items:flex-end;gap:1.2rem;}
.chew-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.chew-col span{font-size:11px;color:#999;}
.chew-bar-wrap{width:16px;height:84px;background:#EDECEA;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;border:.5px solid #D0C8C0;}
.chew-bar{width:100%;background:#1D9E75;transition:height .08s;}
.chew-n{font-size:18px;font-weight:700;color:#1a1a18;}
.speech{background:#fff;border:1.5px solid #D0C8C0;border-radius:12px;padding:9px 13px;font-size:13px;color:#1a1a18;max-width:170px;line-height:1.5;}

/* ===== 画面3: ゲーム ===== */
.badge-row{width:100%;display:flex;justify-content:space-between;}
.badge{border-radius:20px;padding:5px 16px;font-size:13px;font-weight:500;}
.bg{background:#E1F5EE;border:1px solid #5DCAA5;color:#085041;}
.ba{background:#FAEEDA;border:1px solid #EF9F27;color:#412402;}
.timer-num{font-size:56px;font-weight:500;color:#1a1a18;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.prog-wrap{width:100%;max-width:360px;height:20px;background:#EDECEA;border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:#1D9E75;border-radius:10px;transition:width .5s linear;}
.missions{width:100%;max-width:380px;display:flex;flex-direction:column;gap:6px;}
.mission{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:.5px solid #D0C8C0;background:#fff;}
.mission.done{opacity:.5;background:#F5F3F0;}
.mi{font-size:18px;width:26px;text-align:center;}
.mt{flex:1;font-size:13px;color:#1a1a18;}
.mp{font-size:12px;font-weight:500;color:#0F6E56;background:#E1F5EE;border-radius:10px;padding:2px 10px;}
.mission.done .mp{color:#888;background:#EDECEA;}
.stamps{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:34px;max-width:340px;}
.stamp{width:36px;height:36px;border-radius:50%;background:#E1F5EE;border:1.5px solid #5DCAA5;display:flex;align-items:center;justify-content:center;font-size:18px;animation:pop .3s;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.result-box{padding:16px;border-radius:14px;border:1.5px solid #5DCAA5;background:#E1F5EE;text-align:center;font-size:15px;font-weight:500;color:#085041;display:none;width:100%;max-width:360px;line-height:1.9;}

/* ===== キャラSVGアニメ ===== */
.bounce{animation:bnc .4s ease;}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
</style>
</head>

  ]},

const STAMPS  = ['🍙','🥕','🐟','🍠','🥦','🍳','🍜','🍱','🍎','🥚'];
const SPEECH  = ['もぐもぐ！えらい！','おいしいかな？','すごい！','もう少し！','もぐもぐ名人！'];

// ============================================================
//  状態
// ============================================================
let charType = null;   // 'boy' | 'girl'
let ageKey   = null;   // 1 | 3 | 5
let cfg      = null;

let totalSec = 0, remaining = 0, timerInt = null;
let points = 0, stampArr = [], halfDone = false;

// 咀嚼カウント（画面2・3 共有）
let chewCount = 0;

// MediaPipe
let mpReady = false;
let mpCamera = null;

// 顎ピーク検出用
let jawBaseline  = null;
let jawSamples   = [];
let inPeak       = false;

// ============================================================
//  DOM ヘルパ
// ============================================================
const $  = id => document.getElementById(id);
const S1 = $('s1'), S2 = $('s2'), S3 = $('s3');

function showScreen(s){ [S1,S2,S3].forEach(x=>x.classList.remove('on')); s.classList.add('on'); }

// ============================================================
//  画面1: キャラ・年齢選択
// ============================================================
function pickChar(t){
  charType = t;
  $('cBoy').className  = 'ccard boy'  + (t==='boy'  ? ' sel' : '');
  $('cGirl').className = 'ccard girl' + (t==='girl' ? ' sel' : '');
  checkS1();
}
function pickAge(a){
  ageKey = a;
  document.querySelectorAll('.atab').forEach((el,i)=>{
    el.classList.toggle('sel', [1,3,5][i]===a);
  });
  checkS1();
}
function checkS1(){ $('s1Next').disabled = !(charType && ageKey); }

function goS1(){
  // タイマー停止
  if(timerInt){ clearInterval(timerInt); timerInt=null; }
  charType=null; ageKey=null;
  $('cBoy').className='ccard boy'; $('cGirl').className='ccard girl';
  document.querySelectorAll('.atab').forEach(el=>el.classList.remove('sel'));
  $('s1Next').disabled=true;
  showScreen(S1);
}

// ============================================================
//  画面2: カメラ起動 + キャラ表示
// ============================================================
function goS2(){
  applyCharStyle('c2');   // キャラ外見を反映
  chewCount=0; updateChewUI(0);
  jawBaseline=null; jawSamples=[]; inPeak=false;
  showScreen(S2);
  startCamera();
}

// ============================================================
//  キャラクター外見 適用（prefix: 'c2' or 'c3'）
// ============================================================
function applyCharStyle(p){
  const isBoy = charType === 'boy';

  // 体の色
  $(p+'body').setAttribute('fill', isBoy ? '#5BA4D4' : '#E07BAC');

  // 男の子の髪
  [p+'hb', p+'hbL', p+'hbR'].forEach(id => {
    $(id) && $(id).setAttribute('opacity', isBoy ? '1' : '0');
  });

  // 女の子の髪
  if(!isBoy){
    $(p+'hairBack').setAttribute('d',
      'M26 22 Q20 64 28 88 Q40 96 60 96 Q80 96 92 88 Q100 64 94 22 Q90 14 60 14 Q30 14 26 22Z');
    $(p+'hairBack').setAttribute('opacity','1');
    $(p+'hg').setAttribute('d','M26 48 Q26 16 60 16 Q94 16 94 48');
    $(p+'hg').setAttribute('opacity','1');
  } else {
    $(p+'hairBack').setAttribute('d','');
    $(p+'hairBack').setAttribute('opacity','0');
    $(p+'hg').setAttribute('d','');
    $(p+'hg').setAttribute('opacity','0');
  }

  // 女の子専用パーツ
  $(p+'ribbon').setAttribute('opacity', isBoy ? '0' : '1');
  $(p+'lash')  && $(p+'lash').setAttribute('opacity',  isBoy ? '0' : '1');
  $(p+'chkL').setAttribute('opacity', isBoy ? '0' : '0.55');
  $(p+'chkR').setAttribute('opacity', isBoy ? '0' : '0.55');
}

// ============================================================
//  口の動き: ratio 0.0〜1.0 で顎を動かす（prefix指定）
// ============================================================
function setMouth(p, ratio){
  const baseY = 69, openY = 82;
  const y  = baseY + (openY - baseY) * ratio;
  const ry = 4     + 7              * ratio;
  $(p+'jaw').setAttribute('cy',  y.toFixed(2));
  $(p+'jaw').setAttribute('ry',  ry.toFixed(2));
  // 顎パーツの肌色を頭と合わせてつなぎ目を隠す
  $(p+'jaw').setAttribute('fill', '#FAC775');
  $(p+'lip').setAttribute('d',
    `M50 ${baseY} Q60 ${(y + 6*ratio).toFixed(2)} 70 ${baseY}`);
}

// ============================================================
//  両方の画面のキャラに口を反映する
// ============================================================
function applyMouth(ratio){
  setMouth('c2', ratio);
  setMouth('c3', ratio);
}

// ============================================================
//  咀嚼カウントUIを更新
// ============================================================
function updateChewUI(n){
  // 画面2
  $('chewN2').textContent = n;
  $('chewBar').style.height = Math.min(100, n) + '%';
  // 画面3
  $('chewN3').textContent = n;
  $('chewBar3').style.height = Math.min(100, n) + '%';
}

// ============================================================
//  MediaPipe カメラ起動
// ============================================================
async function startCamera(){
  const sdot  = $('sdot');
  const stext = $('stext');
  sdot.className = 'sdot cal';
  stext.textContent = 'カメラを起動しています...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 },
      audio: false
    });
    const video = $('video');
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });

    // FaceMesh 初期化（口・咀嚼検知）
    const fm = new FaceMesh({ locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    fm.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.55,
      minTrackingConfidence: 0.55,
    });
    fm.onResults(onFaceResults);

    // Pose 初期化（腕・手の検知）
    const pose = new Pose({ locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });
    pose.setOptions({
      modelComplexity: 0,          // 軽量モデル（スマホ向け）
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    pose.onResults(onPoseResults);

    // カメラループ：FaceMesh毎フレーム、Poseは2フレームおきで負荷分散
    let frameCount = 0;
    mpCamera = new Camera(video, {
      onFrame: async () => {
        frameCount++;
        await fm.send({ image: video });
        if(frameCount % 2 === 0) await pose.send({ image: video });
      },
      width: 320, height: 240
    });
    mpCamera.start();

    sdot.className = 'sdot on';
    stext.textContent = '顔が映ったら口を動かしてみてね！手も動かせるよ🙌';
    mpReady = true;

  } catch(e) {
    sdot.className = 'sdot';
    stext.textContent = 'カメラの許可が必要です。ブラウザの設定を確認してください。';
    $('calNotice').textContent = '';
  }
}

// ============================================================
//  腕を動かす（肩→手先のline座標を更新）
// ============================================================
const ARM_DOWN = { L:{x:14,y:108}, R:{x:106,y:108} };
const ARM_UP   = { L:{x:10,y:48},  R:{x:110,y:48}  };

function applyArms(rL, rR){
  ['c2','c3'].forEach(p=>{
    const aL=$(p+'armL'), aR=$(p+'armR');
    if(!aL||!aR) return;
    // 左腕（カメラはミラーなので左右反転）
    const lx = ARM_DOWN.L.x + (ARM_UP.L.x - ARM_DOWN.L.x)*rL;
    const ly = ARM_DOWN.L.y + (ARM_UP.L.y - ARM_DOWN.L.y)*rL;
    aL.setAttribute('x2', lx.toFixed(1));
    aL.setAttribute('y2', ly.toFixed(1));
    // 右腕
    const rx = ARM_DOWN.R.x + (ARM_UP.R.x - ARM_DOWN.R.x)*rR;
    const ry = ARM_DOWN.R.y + (ARM_UP.R.y - ARM_DOWN.R.y)*rR;
    aR.setAttribute('x2', rx.toFixed(1));
    aR.setAttribute('y2', ry.toFixed(1));
  });
}

// ============================================================
//  Pose コールバック（手の上げ下げ検出）
// ============================================================
let bothRaisedSaid = false;
function onPoseResults(res){
  if(!res.poseLandmarks){ applyArms(0,0); return; }
  const lm = res.poseLandmarks;
  // 11=左肩 12=右肩 15=左手首 16=右手首
  const ls=lm[11], rs=lm[12], lw=lm[15], rw=lm[16];
  if(!ls||!rs||!lw||!rw){ applyArms(0,0); return; }

  const avgShoulderY = (ls.y + rs.y) / 2;
  // 手首が肩より上にある割合（0〜1）。カメラY軸は下向きなので反転。
  const rL = Math.min(1, Math.max(0, (avgShoulderY - lw.y + 0.04) / 0.22));
  const rR = Math.min(1, Math.max(0, (avgShoulderY - rw.y + 0.04) / 0.22));

  applyArms(rR, rL); // ミラー表示なので左右スワップ

  // 両手を上げたら特別メッセージ
  if(rL > 0.6 && rR > 0.6){
    if(!bothRaisedSaid){
      bothRaisedSaid = true;
      randomSpeech(['やったー！🙌','すごい！両手！','えらい！']);
    }
  } else {
    bothRaisedSaid = false;
  }
}

// ============================================================
//  FaceMesh コールバック ★ ここが口連動の核心 ★
// ============================================================
function onFaceResults(results){
  if(!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0){
    applyMouth(0);
    inPeak = false;
    return;
  }

  const lm = results.multiFaceLandmarks[0];

  // ── 1. 口の「見た目」連動 ──────────────────────────────
  // 上唇中央(13) と 下唇中央(14) の Y 距離を顔高さで正規化
  const faceH   = Math.abs(lm[152].y - lm[10].y) || 0.001;
  const lipGap  = Math.max(0, lm[14].y - lm[13].y);
  const lipNorm = lipGap / faceH;

  // 0.02=閉じ / 0.18=全開 でクランプ → ratio 0〜1
  const lipRatio = Math.min(1, Math.max(0, (lipNorm - 0.02) / 0.16));
  applyMouth(lipRatio);

  // ── 2. 咀嚼カウント（顎の上下ピーク検出）───────────────
  // 顎先(152) と 鼻下(164) の Y 距離で顎の動きを計測
  const jawDist = Math.abs(lm[152].y - lm[164].y) / faceH;

  // ベースライン確立（最初の20フレームで平均を取る）
  if(jawBaseline === null){
    jawSamples.push(jawDist);
    if(jawSamples.length >= 20){
      jawBaseline = jawSamples.reduce((a,b)=>a+b,0) / jawSamples.length;
      jawSamples  = [];
      $('calNotice').textContent = '検出OK！もぐもぐしてみてね 🟢';
      $('s2Start').disabled = false;
    } else {
      $('calNotice').textContent = `キャリブレーション中... ${jawSamples.length}/20`;
    }
    return;
  }

  // ベースラインからのズレ（顎が下がる＝＋方向）
  const delta = jawDist - jawBaseline;

  // 閾値を超えたら「山の中」、下がったら1カウント
  const RISE  = 0.010;   // 山の立ち上がり閾値
  const FALL  = 0.003;   // 山の立ち下がり閾値

  if(!inPeak && delta > RISE){
    inPeak = true;
  } else if(inPeak && delta < FALL){
    inPeak = false;
    // ★ 咀嚼 1 回カウント
    chewCount++;
    updateChewUI(chewCount);
    bounceChar();
    if(chewCount % 10 === 0) randomSpeech();
    // ゲーム中ならミッションチェック
    if(timerInt) checkChewMissions();
  }

  // ベースラインをゆっくり追従（姿勢ドリフト補正）
  jawBaseline = jawBaseline * 0.985 + jawDist * 0.015;
}

// ============================================================
//  キャラクターバウンス
// ============================================================
function bounceChar(){
  [$('charSvg2'), $('charSvg3')].forEach(el=>{
    if(!el) return;
    el.classList.remove('bounce');
    void el.offsetWidth;
    el.classList.add('bounce');
    setTimeout(()=>el.classList.remove('bounce'), 400);
  });
}

function randomSpeech(arr){
  const pool = arr || SPEECH;
  const msg = pool[Math.floor(Math.random() * pool.length)];
  $('speech2').textContent = msg;
  $('speech3').textContent = msg;
}

// ============================================================
//  画面3: ゲーム開始
// ============================================================
function goS3(){
  // キャラを画面3にも反映
  applyCharStyle('c3');
  chewCount = 0; updateChewUI(0);

  // ミッション初期化
  cfg = JSON.parse(JSON.stringify(CFGS[ageKey]));
  totalSec = cfg.mins * 60;
  remaining = totalSec;
  points = 0; stampArr = []; halfDone = false;
  $('ptBadge').textContent = '⭐ 0 pt';
  $('lvBadge').textContent = 'レベル 1';
  $('stampsEl').innerHTML = '';
  $('resultEl').style.display = 'none';
  renderMissions();
  updateTimer();

  showScreen(S3);

  // タイマー開始
  timerInt = setInterval(()=>{
    remaining--;
    updateTimer();
    if(!halfDone && remaining <= totalSec/2){
      halfDone = true;
      completeMission('half');
    }
    // 目パチ
    if(Math.random() < 0.04) blink();
    if(remaining <= 0){ clearInterval(timerInt); timerInt=null; finish(); }
  }, 1000);
}

// ============================================================
//  タイマー表示
// ============================================================
function updateTimer(){
  const m = String(Math.floor(remaining/60)).padStart(2,'0');
  const s = String(remaining%60).padStart(2,'0');
  $('timerEl').textContent = m+':'+s;
  $('progFill').style.width = Math.round(totalSec>0?(remaining/totalSec)*100:0) + '%';
}

// ============================================================
//  ミッション
// ============================================================
function renderMissions(){
  $('missionEl').innerHTML = '';
  cfg.missions.forEach(m=>{
    const d = document.createElement('div');
    d.className = 'mission' + (m.done?' done':'');
    d.id = 'ms-'+m.id;
    d.innerHTML = `<div class="mi">${m.done?'✅':m.icon}</div>`+
                  `<div class="mt">${m.text}</div>`+
                  `<div class="mp">${m.done?'クリア！':'+'+m.pts+'pt'}</div>`;
    $('missionEl').appendChild(d);
  });
}

function completeMission(id){
  const m = cfg.missions.find(x=>x.id===id);
  if(!m || m.done) return;
  m.done = true;
  addPoints(m.pts);
  addStamp();
  randomSpeech();
  bounceChar();
  renderMissions();
}

function checkChewMissions(){
  const map = {c20:20, c30:30, c50:50, c60:60, c100:100};
  Object.entries(map).forEach(([id,n])=>{ if(chewCount>=n) completeMission(id); });
}

function addPoints(p){
  points += p;
  $('ptBadge').textContent = '⭐ '+points+' pt';
  $('lvBadge').textContent = 'レベル '+(points<30?1:points<70?2:points<120?3:4);
}

function addStamp(){
  const s = document.createElement('div');
  s.className = 'stamp';
  s.textContent = STAMPS[stampArr.length % STAMPS.length];
  $('stampsEl').appendChild(s);
  stampArr.push(s);
}

// ============================================================
//  目パチ
// ============================================================
function blink(){
  [['c2eL','c2eR'],['c3eL','c3eR']].forEach(([l,r])=>{
    const eL=$(l), eR=$(r);
    if(!eL||!eR) return;
    eL.setAttribute('ry','1'); eR.setAttribute('ry','1');
    setTimeout(()=>{ eL.setAttribute('ry','6'); eR.setAttribute('ry','6'); }, 140);
  });
}

// ============================================================
//  ゲーム終了
// ============================================================
function finish(){
  completeMission('fin');
  const lv = points<30?1:points<70?2:points<120?3:4;
  $('resultEl').style.display = 'block';
  $('resultEl').innerHTML =
    `🎉 ごはんかんりょう！<br>⭐ ${points}pt　レベル${lv}　もぐもぐ${chewCount}回　スタンプ×${stampArr.length}`;
  $('speech3').textContent = 'やったー！すごい！';
  bounceChar();
}
</script>
